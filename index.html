<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alesis Micron Editor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rippleui@1.12.1/dist/css/styles.css">
<style>
:root { --piano-w: 56px; }
body { background:#0f1117; color:#ccc; margin:0; font-family:monospace; font-size:13px; }
#app { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
#toolbar { display:flex; align-items:center; gap:8px; padding:6px 10px; background:#1a1d26; border-bottom:1px solid #2a2d3a; flex-shrink:0; flex-wrap:wrap; }
#toolbar button { padding:3px 10px; }
#roll-wrap { flex:0 0 220px; position:relative; overflow:hidden; }
canvas#roll { display:block; }
#panel { flex:1; overflow-y:auto; padding:10px; }
.param-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.param-row label { width:130px; text-align:right; color:#aaa; }
.param-row input[type=range] { flex:1; max-width:200px; }
.param-row span.val { width:40px; }
.param-row select { flex:1; max-width:200px; }
.step-grid { display:flex; gap:2px; flex-wrap:wrap; padding:4px; }
.step { width:36px; height:36px; border:1px solid #333; border-radius:3px; background:#1a1d26;
  display:flex; align-items:center; justify-content:center; font-size:9px; cursor:pointer;
  user-select:none; overflow:hidden; }
.step.has-notes { background:#1e3a5f; border-color:#2a5a8f; }
.step.cursor { outline:2px solid #4a9eff; outline-offset:-1px; }
.pat-grid { display:flex; gap:6px; flex-wrap:wrap; padding:4px; }
.pat { width:80px; height:50px; border:1px solid #333; border-radius:4px; background:#1a1d26;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  font-size:11px; cursor:pointer; gap:2px; }
.pat.active { border-color:#4a9eff; background:#0d2340; }
.chain-slot { display:inline-block; width:36px; height:24px; border:1px solid #333;
  border-radius:3px; background:#1a1d26; text-align:center; line-height:24px;
  font-size:11px; margin:2px; cursor:pointer; }
.chain-slot.filled { background:#1e3a5f; border-color:#4a9eff; }
.midi-dot { width:10px; height:10px; border-radius:50%; background:#444; display:inline-block; }
.midi-dot.ok { background:#4caf50; }
.ptabs { display:flex; gap:4px; margin-bottom:8px; flex-wrap:wrap; }
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, applyDiff } from 'https://esm.sh/webjsx@latest';
import htm from 'https://esm.sh/htm@3';
const html = htm.bind(h);

// 1. STATE
const S = {
  midi: { access: null, output: null, outputs: [], channel: 1 },
  sysex: { lastRx: null, lastTx: null, rxLog: '', bank: Array(128).fill(null), presetNum: 0 },
  tab: 'seq',
  bpm: 120,
  playing: false,
  cursor: 0,
  pitchOffset: 48,
  zoomX: 40,
  zoomY: 14,
  pending: [],
  debounceTimer: null,
  debounceActive: false,
  patIdx: 0,
  patterns: Array.from({length:16}, (_,i) => ({
    name: `Pat ${i+1}`,
    len: 16,
    steps: Array.from({length:64}, () => ({notes:[], len:0.0625}))
  })),
  chain: [],
  patch: {},
  playStep: 0,
  playTime: 0,
  schedTimer: null,
  audioCtx: null,
  gpPrev: {},
  stepLen: 0.0625,
  nrpnNum: 0,
  nrpnVal: 0,
  patchTab: 'Oscillators',
};

const pat = () => S.patterns[S.patIdx];
const step = (i) => pat().steps[i] || pat().steps[0];

// 2. MIDI
async function initMIDI() {
  try {
    S.midi.access = await navigator.requestMIDIAccess({ sysex: true });
    S.midi.outputs = [...S.midi.access.outputs.values()];
    if (S.midi.outputs.length) S.midi.output = S.midi.outputs[0];
    S.midi.access.onstatechange = () => {
      S.midi.outputs = [...S.midi.access.outputs.values()];
      if (!S.midi.output && S.midi.outputs.length) S.midi.output = S.midi.outputs[0];
      render();
    };
    S.midi.access.inputs.forEach(inp => { inp.onmidimessage = handleCC; });
    render();
  } catch(e) { console.warn('MIDI unavailable', e); }
}

function midiOut(data, t) {
  if (!S.midi.output) return;
  try { t !== undefined ? S.midi.output.send(data, t) : S.midi.output.send(data); } catch(e) {}
}

function sendNRPN(nrpn, val) {
  const ch = S.midi.channel - 1;
  midiOut([0xB0|ch, 99, nrpn >> 7]);
  midiOut([0xB0|ch, 98, nrpn & 127]);
  midiOut([0xB0|ch, 6,  val >> 7]);
  midiOut([0xB0|ch, 38, val & 127]);
}

function sendNoteOn(pitch, vel) { midiOut([0x90|(S.midi.channel-1), pitch, vel||100]); }
function sendNoteOff(pitch) { midiOut([0x80|(S.midi.channel-1), pitch, 0]); }

function previewNote(pitch) {
  sendNoteOn(pitch, 100);
  setTimeout(() => sendNoteOff(pitch), 200);
}

function handleCC(e) {
  if (!e.data) return;
  // SysEx: F0 00 00 0E 14 ...
  if (e.data[0] === 0xF0 && e.data[1] === 0x00 && e.data[2] === 0x00 && e.data[3] === 0x0E && e.data[4] === 0x14) {
    handleSysEx(e.data); return;
  }
  if (e.data[1] !== 1) return;
  const lensArr = [0.0625,0.125,0.25,0.5,1,1.5,2,3,4];
  const idx = Math.floor(e.data[2] / 128 * lensArr.length);
  const st = step(S.cursor);
  st.notes.forEach(n => { n.len = lensArr[Math.min(idx, lensArr.length-1)]; });
  drawRoll();
}

// SYSEX — Alesis Micron: F0 00 00 0E 14 [cmd] [...data] F7
// cmd 0x00 = request patch, cmd 0x01 = patch dump response
function pack8to7(bytes) {
  const out = [];
  for (let i = 0; i < bytes.length; i += 7) {
    const chunk = bytes.slice(i, i+7);
    let msbs = 0;
    chunk.forEach((b,j) => { if (b & 0x80) msbs |= (1<<j); });
    out.push(msbs & 0x7F);
    chunk.forEach(b => out.push(b & 0x7F));
  }
  return out;
}

function unpack7to8(data) {
  const out = [];
  for (let i = 0; i < data.length; i += 8) {
    const msbs = data[i];
    for (let j = 1; j <= 7 && (i+j) < data.length; j++)
      out.push(data[i+j] | (((msbs >> (j-1)) & 1) << 7));
  }
  return out;
}

function handleSysEx(data) {
  const hex = Array.from(data).map(b=>b.toString(16).padStart(2,'0')).join(' ');
  S.sysex.lastRx = data;
  S.sysex.rxLog = hex.slice(0,500);
  // cmd byte at index 5
  const cmd = data[5];
  if (cmd === 0x01 || cmd === 0x02) {
    // patch dump: bytes 6..n-1 are 7-bit packed patch data
    const raw = Array.from(data).slice(6, data.length-1);
    const unpacked = unpack7to8(raw);
    // first 8 bytes = patch name ASCII
    const name = unpacked.slice(0,8).map(b=>String.fromCharCode(b||32)).join('').trim();
    // remaining bytes map to NRPN 0..N in order
    for (let i = 8; i < unpacked.length; i++) S.patch[i-8] = unpacked[i];
    if (S.sysex.presetNum >= 0) S.sysex.bank[S.sysex.presetNum] = { name, data: unpacked };
    S.sysex.rxLog = `Rx: "${name}" (${unpacked.length} params)\n` + hex.slice(0,400);
  }
  render();
}

function requestPatch(presetNum) {
  presetNum = presetNum ?? S.sysex.presetNum;
  S.sysex.presetNum = presetNum;
  const msg = [0xF0, 0x00, 0x00, 0x0E, 0x14, 0x00, presetNum & 0x7F, 0xF7];
  S.sysex.lastTx = msg;
  midiOut(msg);
}

function sendPatchDump() {
  // Serialize S.patch into ordered bytes (NRPN 0..N)
  const maxNrpn = Math.max(0, ...Object.keys(S.patch).map(Number));
  const bytes = [0,...Array(7).fill(32)]; // 8-byte name (spaces)
  for (let i = 0; i <= maxNrpn; i++) bytes.push(S.patch[i] ?? 0);
  const packed = pack8to7(bytes);
  const msg = [0xF0, 0x00, 0x00, 0x0E, 0x14, 0x02, ...packed, 0xF7];
  S.sysex.lastTx = msg;
  midiOut(msg);
}

function saveSyx() {
  const data = S.sysex.lastRx || S.sysex.lastTx;
  if (!data) return;
  const blob = new Blob([new Uint8Array(data)], {type:'application/octet-stream'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'micron_patch.syx'; a.click();
}

function loadSyx(file) {
  const reader = new FileReader();
  reader.onload = e => {
    const bytes = new Uint8Array(e.target.result);
    handleSysEx(bytes);
  };
  reader.readAsArrayBuffer(file);
}

function requestBankDump() {
  // Request all 128 presets sequentially with 200ms gap
  let i = 0;
  const next = () => { if (i < 128) { requestPatch(i++); setTimeout(next, 200); } };
  next();
}

// 3. CANVAS PIANO ROLL
let RC, RX;
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const isBlack = p => [1,3,6,8,10].includes(p % 12);

function initCanvas() {
  RC = document.getElementById('roll');
  if (!RC) return;
  RX = RC.getContext('2d');
  const wrap = document.getElementById('roll-wrap');
  RC.width = wrap.clientWidth || 900;
  RC.height = wrap.clientHeight || 220;
  RC.addEventListener('mousedown', onRollMouse);
  RC.addEventListener('contextmenu', e => e.preventDefault());
  RC.addEventListener('wheel', onRollWheel, {passive:false});
  RC.addEventListener('touchstart', onRollTouchStart, {passive:false});
  RC.addEventListener('touchmove', onRollTouchMove, {passive:false});
  drawRoll();
}

function drawRoll() {
  if (!RX) return;
  const W = RC.width, H = RC.height;
  const pw = 56, zh = S.zoomY, zx = S.zoomX;
  const rows = Math.ceil(H / zh) + 2;
  RX.fillStyle = '#0f1117';
  RX.fillRect(0, 0, W, H);

  for (let r = 0; r < rows; r++) {
    const pitch = S.pitchOffset + r;
    if (pitch < 0 || pitch > 127) continue;
    const y = H - (r + 1) * zh;
    RX.fillStyle = isBlack(pitch) ? '#111318' : '#1a1d26';
    RX.fillRect(pw, y, W - pw, zh);
    RX.strokeStyle = '#222';
    RX.lineWidth = 1;
    RX.beginPath(); RX.moveTo(pw, y); RX.lineTo(W, y); RX.stroke();
    RX.fillStyle = isBlack(pitch) ? '#1e2028' : '#d0d0d0';
    RX.fillRect(0, y, pw - 2, zh - 1);
    if (!isBlack(pitch) && zh >= 10) {
      RX.fillStyle = '#555';
      RX.font = `${Math.min(zh-2,11)}px monospace`;
      RX.fillText(NOTE_NAMES[pitch%12]+(Math.floor(pitch/12)-1), 2, y+zh-3);
    }
  }

  for (let s = 0; s < pat().len; s++) {
    const x = pw + s * zx;
    if (x > W) break;
    if (s % 4 === 0) {
      RX.strokeStyle = s % 16 === 0 ? '#444' : '#2a2a2a';
      RX.lineWidth = 1;
      RX.beginPath(); RX.moveTo(x, 0); RX.lineTo(x, H); RX.stroke();
    }
  }

  const cx = pw + S.cursor * zx;
  RX.fillStyle = '#4a9eff18';
  RX.fillRect(cx, 0, zx, H);
  RX.strokeStyle = '#4a9eff';
  RX.lineWidth = 1;
  RX.strokeRect(cx, 0, zx, H);

  for (let s = 0; s < pat().len; s++) {
    const st = pat().steps[s];
    if (!st) continue;
    st.notes.forEach(n => {
      const r = n.pitch - S.pitchOffset;
      if (r < 0 || r >= rows) return;
      const x = pw + s * zx + 1;
      const y = H - (r + 1) * zh + 1;
      const w = Math.max((n.len || S.stepLen) * 16 * zx - 2, 3);
      const hue = (n.pitch * 7) % 360;
      RX.fillStyle = `hsl(${hue},55%,42%)`;
      RX.fillRect(x, y, w, zh - 2);
      if (w > 18) {
        RX.fillStyle = '#fff';
        RX.font = '9px monospace';
        RX.fillText(NOTE_NAMES[n.pitch%12], x+2, y+zh-4);
      }
    });
  }

  S.pending.forEach(n => {
    const r = n.pitch - S.pitchOffset;
    if (r < 0 || r >= rows) return;
    const x = pw + S.cursor * zx + 1;
    const y = H - (r + 1) * zh + 1;
    RX.fillStyle = '#ffffff55';
    RX.fillRect(x, y, zx - 2, zh - 2);
  });

  if (S.playing) {
    const px = pw + (S.playStep % pat().len) * zx;
    RX.strokeStyle = '#ffeb3b';
    RX.lineWidth = 2;
    RX.beginPath(); RX.moveTo(px, 0); RX.lineTo(px, H); RX.stroke();
  }
}

function rollPitchAt(y) { return S.pitchOffset + Math.floor((RC.height - y) / S.zoomY); }
function rollStepAt(x)  { return Math.floor((x - 56) / S.zoomX); }

function onRollMouse(e) {
  e.preventDefault();
  const rect = RC.getBoundingClientRect();
  const s = rollStepAt(e.clientX - rect.left);
  const p = rollPitchAt(e.clientY - rect.top);
  if (s < 0 || s >= pat().len) return;
  const st = step(s);
  if (e.button === 2) {
    st.notes = st.notes.filter(n => n.pitch !== p);
  } else if (!st.notes.find(n => n.pitch === p)) {
    st.notes.push({pitch:p, vel:100, len:S.stepLen});
  }
  drawRoll(); render();
}

let touchT0 = 0, touchP0 = 0, touchS0 = 0, pinchD0 = 0;
function onRollTouchStart(e) {
  e.preventDefault();
  if (e.touches.length === 1) {
    const rect = RC.getBoundingClientRect();
    touchS0 = rollStepAt(e.touches[0].clientX - rect.left);
    touchP0 = rollPitchAt(e.touches[0].clientY - rect.top);
    touchT0 = Date.now();
  } else if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    pinchD0 = Math.hypot(dx, dy);
  }
}
function onRollTouchMove(e) {
  e.preventDefault();
  if (e.touches.length !== 2) return;
  const dx = e.touches[0].clientX - e.touches[1].clientX;
  const dy = e.touches[0].clientY - e.touches[1].clientY;
  const d = Math.hypot(dx, dy);
  if (pinchD0) S.zoomX = Math.max(8, Math.min(120, S.zoomX * d / pinchD0));
  pinchD0 = d;
  drawRoll();
}
document.addEventListener('touchend', () => {
  if (touchS0 >= 0 && touchS0 < pat().len) {
    const st = step(touchS0);
    if (Date.now() - touchT0 > 500) {
      st.notes = st.notes.filter(n => n.pitch !== touchP0);
    } else if (!st.notes.find(n => n.pitch === touchP0)) {
      st.notes.push({pitch:touchP0, vel:100, len:S.stepLen});
    }
    drawRoll(); render();
  }
  touchS0 = -1;
});

function onRollWheel(e) {
  e.preventDefault();
  if (e.ctrlKey)       S.zoomX = Math.max(8, Math.min(120, S.zoomX - e.deltaY * 0.1));
  else if (e.shiftKey) S.zoomY = Math.max(6, Math.min(40,  S.zoomY - e.deltaY * 0.1));
  else S.pitchOffset = Math.max(0, Math.min(116, S.pitchOffset + (e.deltaY > 0 ? -1 : 1)));
  drawRoll();
}

// 4. KEY MAP (no duplicate pitches)
const KEYS = {
  q:60, w:62, e:64, r:65, t:67, y:69, u:71, i:72, o:74, p:76,
  a:48, s:50, d:52, f:53, g:55, h:57, j:59,
  '2':61, '3':63, '5':66, '6':68, '7':70
};
const LEN_MAP = {'1':0.0625,'2':0.125,'3':0.25,'4':0.5,'5':1,'6':1.5,'7':2,'8':3,'9':4};

function onKeyDown(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ')         { e.preventDefault(); commitStep(); return; }
  if (e.key === 'Backspace') {
    e.preventDefault();
    step(S.cursor).notes = []; S.pending = [];
    clearTimeout(S.debounceTimer); S.debounceActive = false;
    drawRoll(); render(); return;
  }
  if (e.key === 'ArrowLeft')  { S.cursor = Math.max(0, S.cursor-1); drawRoll(); render(); return; }
  if (e.key === 'ArrowRight') { S.cursor = Math.min(pat().len-1, S.cursor+1); drawRoll(); render(); return; }
  if (e.key === 'ArrowUp')    { S.pitchOffset = Math.min(116, S.pitchOffset+1); drawRoll(); return; }
  if (e.key === 'ArrowDown')  { S.pitchOffset = Math.max(0, S.pitchOffset-1); drawRoll(); return; }
  if (!e.shiftKey && LEN_MAP[e.key]) { S.stepLen = LEN_MAP[e.key]; render(); return; }

  const pitch = KEYS[e.key] || KEYS[e.key.toLowerCase()];
  if (!pitch) return;
  e.preventDefault();

  if (!S.debounceActive) S.pending = [];
  if (!S.pending.find(n => n.pitch === pitch)) {
    S.pending.push({pitch, vel:100, len:S.stepLen});
    previewNote(pitch);
  }
  step(S.cursor).notes = S.pending.map(n => ({...n}));
  S.debounceActive = true;
  clearTimeout(S.debounceTimer);
  S.debounceTimer = setTimeout(() => { S.debounceActive = false; }, 2000);
  drawRoll(); render();
}

function commitStep() {
  clearTimeout(S.debounceTimer); S.debounceActive = false; S.pending = [];
  S.cursor = (S.cursor + 1) % pat().len;
  drawRoll(); render();
}

// 5. GAMEPAD
function pollGamepad() {
  requestAnimationFrame(pollGamepad);
  const gp = (navigator.getGamepads ? navigator.getGamepads() : [])[0];
  if (!gp) return;
  const b  = i => !!(gp.buttons[i] && gp.buttons[i].pressed);
  const ax = i => gp.axes[i] || 0;
  const p  = i => b(i) && !S.gpPrev[i];
  const dL = b(14)||ax(0)<-0.5, dR = b(15)||ax(0)>0.5;
  const dU = b(12)||ax(1)<-0.5, dD = b(13)||ax(1)>0.5;

  if (p(0)) commitStep();
  if (p(1)) { step(S.cursor).notes=[]; S.pending=[]; drawRoll(); render(); }
  if (dL && !S.gpPrev.dL) { S.cursor=Math.max(0,S.cursor-1); drawRoll(); render(); }
  if (dR && !S.gpPrev.dR) { S.cursor=Math.min(pat().len-1,S.cursor+1); drawRoll(); render(); }
  if (dU && !S.gpPrev.dU) { S.pitchOffset=Math.min(116,S.pitchOffset+1); drawRoll(); }
  if (dD && !S.gpPrev.dD) { S.pitchOffset=Math.max(0,S.pitchOffset-1); drawRoll(); }

  const lt = gp.buttons[6] ? gp.buttons[6].value : 0;
  const rt = gp.buttons[7] ? gp.buttons[7].value : 0;
  if (lt > 0.1) { S.zoomX=Math.max(8,S.zoomX-lt*0.5); drawRoll(); }
  if (rt > 0.1) { S.zoomX=Math.min(120,S.zoomX+rt*0.5); drawRoll(); }

  for (let i=0;i<20;i++) S.gpPrev[i]=b(i);
  S.gpPrev.dL=dL; S.gpPrev.dR=dR; S.gpPrev.dU=dU; S.gpPrev.dD=dD;
}

// 6. TRANSPORT
function togglePlay() {
  if (S.playing) {
    S.playing = false; clearInterval(S.schedTimer); S.schedTimer = null;
    pat().steps.forEach(st => st.notes.forEach(n => sendNoteOff(n.pitch)));
    drawRoll(); render(); return;
  }
  if (!S.audioCtx) S.audioCtx = new AudioContext();
  S.playing = true; S.playStep = 0; S.playTime = S.audioCtx.currentTime;
  S.schedTimer = setInterval(scheduler, 25);
  render();
}

function scheduler() {
  if (!S.audioCtx || !S.playing) return;
  const stepDur = 60 / S.bpm / 4;
  while (S.playTime < S.audioCtx.currentTime + 0.1) {
    const idx = S.playStep % pat().len;
    const st = pat().steps[idx];
    if (st) st.notes.forEach(n => {
      const dur = (n.len || S.stepLen) * 16 * stepDur * 0.9;
      midiOut([0x90|(S.midi.channel-1), n.pitch, n.vel||100], S.playTime * 1000);
      midiOut([0x80|(S.midi.channel-1), n.pitch, 0], (S.playTime+dur) * 1000);
    });
    S.playTime += stepDur;
    S.playStep++;
  }
  drawRoll();
}

// 7. PATCH PARAMS
const mkOsc = (base, name) => [
  {label:`${name} Pitch`,    nrpn:base,   min:-64,max:63,  def:0},
  {label:`${name} Fine`,     nrpn:base+1, min:-64,max:63,  def:0},
  {label:`${name} Wave`,     nrpn:base+2, min:0,  max:127, def:0},
  {label:`${name} PulseW`,   nrpn:base+3, min:0,  max:127, def:64},
  {label:`${name} SyncTune`, nrpn:base+4, min:0,  max:127, def:0},
  {label:`${name} FmAmt`,    nrpn:base+5, min:0,  max:127, def:0},
];
const mkEnv = (base, name) => [
  {label:`${name} AtkTime`,  nrpn:base,   min:0,max:127,def:0},
  {label:`${name} AtkSlope`, nrpn:base+1, min:0,max:127,def:64},
  {label:`${name} DcyTime`,  nrpn:base+2, min:0,max:127,def:40},
  {label:`${name} SusLevel`, nrpn:base+3, min:0,max:127,def:64},
  {label:`${name} RelTime`,  nrpn:base+4, min:0,max:127,def:30},
  {label:`${name} Velocity`, nrpn:base+5, min:0,max:127,def:64},
];
const PATCH_DEFS = {
  Oscillators: [...mkOsc(0,'Osc1'),...mkOsc(21,'Osc2'),...mkOsc(42,'Osc3')],
  Filters: [
    {label:'Filt1 Cutoff',nrpn:63,min:0,max:127,def:64},
    {label:'Filt1 Reso',  nrpn:64,min:0,max:127,def:0},
    {label:'Filt2 Cutoff',nrpn:65,min:0,max:127,def:64},
    {label:'Filt2 Reso',  nrpn:66,min:0,max:127,def:0},
  ],
  Envelopes: [...mkEnv(66,'Env1'),...mkEnv(73,'Env2'),...mkEnv(80,'Env3')],
  LFOs: [
    {label:'LFO1 Rate',nrpn:106,min:0,max:127,def:64},
    {label:'LFO2 Rate',nrpn:110,min:0,max:127,def:64},
  ],
  Track: [
    {label:'Glide',nrpn:120,min:0,max:127,def:0},
    {label:'Input',nrpn:118,min:0,max:127,def:0},
  ],
};
const MOD_SRC = ['Off','PitchBend','ModWheel','Velocity','Aftertouch','LFO1','LFO2','SH','Env1','Env2','Env3','Osc1','Osc2','Osc3','Noise','Ext'];
const MOD_DST = ['Off','Osc1Pitch','Osc2Pitch','Osc3Pitch','Osc1Fine','Osc2Fine','Osc3Fine','Osc1Wave','Osc2Wave','Osc3Wave','Filt1Cut','Filt2Cut','Filt1Res','Filt2Res','AmpLevel','FX1Prm','FX2Prm','PanBal','LFO1Rate','LFO2Rate'];

const gv = (nrpn, def) => S.patch[nrpn] !== undefined ? S.patch[nrpn] : def;
const sv = (nrpn, val) => { S.patch[nrpn] = val; sendNRPN(nrpn, val + 64); };

// 8. RENDER FUNCTIONS
function renderSysex() {
  const sx = S.sysex;
  return html`<div>
    <div class="param-row" style="flex-wrap:wrap;gap:6px">
      <button class="btn btn-sm btn-primary" onclick=${() => requestPatch(sx.presetNum)}>Request Patch</button>
      <button class="btn btn-sm btn-primary" onclick=${() => sendPatchDump()}>Send Patch</button>
      <button class="btn btn-sm" onclick=${() => saveSyx()}>Save .syx</button>
      <label class="btn btn-sm" style="cursor:pointer">Load .syx
        <input type="file" accept=".syx,.mid" style="display:none"
          onchange=${e => e.target.files[0] && loadSyx(e.target.files[0])} />
      </label>
      <button class="btn btn-sm" onclick=${() => requestBankDump()}>Dump All 128</button>
    </div>
    <div class="param-row" style="margin-top:8px">
      <label>Preset #</label>
      <input type="number" style="width:60px" value=${sx.presetNum} min="0" max="127"
        oninput=${e => { sx.presetNum = parseInt(e.target.value)||0; }} />
      <span style="color:#666;font-size:11px">(0–127)</span>
    </div>
    <div style="margin-top:10px">
      <b style="font-size:12px">Patch Bank</b>
      <div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;max-height:160px;overflow-y:auto">
        ${Array.from({length:128},(_,i) => {
          const p = sx.bank[i];
          return html`<div
            style=${'width:72px;height:28px;border:1px solid '+(i===sx.presetNum?'#4a9eff':'#333')+';border-radius:3px;background:'+(p?'#1e3a5f':'#1a1d26')+';display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;overflow:hidden;padding:0 2px'}
            onclick=${() => { sx.presetNum=i; requestPatch(i); render(); }}>
            ${p ? p.name : i}
          </div>`;
        })}
      </div>
    </div>
    <div style="margin-top:10px">
      <b style="font-size:12px">RX Log</b>
      <pre style="background:#111;padding:6px;border-radius:4px;font-size:10px;max-height:100px;overflow:auto;color:#4a9eff;margin:4px 0 0">${sx.rxLog || '(none)'}</pre>
    </div>
  </div>`;
}

function renderMidi() {
  const ok = !!S.midi.output;
  return html`<div>
    <div class="param-row">
      <label>Output</label>
      <select onchange=${e => { S.midi.output = S.midi.outputs.find(o=>o.id===e.target.value)||null; render(); }}>
        ${S.midi.outputs.length===0 ? html`<option>No MIDI outputs</option>` : null}
        ${S.midi.outputs.map(o => html`<option value=${o.id} selected=${!!(S.midi.output&&S.midi.output.id===o.id)}>${o.name}</option>`)}
      </select>
      <span class=${'midi-dot'+(ok?' ok':'')}></span>
      <button class="btn btn-sm" onclick=${() => initMIDI()}>Refresh</button>
    </div>
    <div class="param-row">
      <label>Channel</label>
      <select onchange=${e => { S.midi.channel=parseInt(e.target.value); render(); }}>
        ${Array.from({length:16},(_,i) => html`<option value=${i+1} selected=${S.midi.channel===i+1}>${i+1}</option>`)}
      </select>
    </div>
    <div class="param-row" style="margin-top:14px">
      <label>NRPN #</label>
      <input type="number" style="width:70px" value=${S.nrpnNum}
        oninput=${e => { S.nrpnNum=parseInt(e.target.value)||0; }} />
      <label>Val</label>
      <input type="number" style="width:70px" value=${S.nrpnVal}
        oninput=${e => { S.nrpnVal=parseInt(e.target.value)||0; }} />
      <button class="btn btn-sm btn-primary" onclick=${() => sendNRPN(S.nrpnNum, S.nrpnVal)}>Send</button>
    </div>
  </div>`;
}

function renderModMatrix() {
  return html`<div>
    ${Array.from({length:12},(_,i) => {
      const base=150+i*4, src=gv(base,0), dst=gv(base+1,0), lvl=gv(base+2,64);
      return html`<div class="param-row">
        <label>Mod ${i+1}</label>
        <select onchange=${e => { sv(base,parseInt(e.target.value)); render(); }}>
          ${MOD_SRC.map((s,si) => html`<option value=${si} selected=${src===si}>${s}</option>`)}
        </select>
        <span>→</span>
        <select onchange=${e => { sv(base+1,parseInt(e.target.value)); render(); }}>
          ${MOD_DST.map((d,di) => html`<option value=${di} selected=${dst===di}>${d}</option>`)}
        </select>
        <input type="range" min="0" max="127" value=${lvl} style="width:80px"
          oninput=${e => { sv(base+2,parseInt(e.target.value)); render(); }} />
        <span class="val">${lvl}</span>
      </div>`;
    })}
  </div>`;
}

function renderPatch() {
  const params = PATCH_DEFS[S.patchTab] || [];
  return html`<div>
    <div class="ptabs">
      ${[...Object.keys(PATCH_DEFS),'Mod'].map(t =>
        html`<button class=${'btn btn-sm '+(S.patchTab===t?'btn-primary':'')}
          onclick=${() => { S.patchTab=t; render(); }}>${t}</button>`
      )}
    </div>
    ${S.patchTab==='Mod' ? renderModMatrix() : html`<div>
      ${params.map(p => {
        const v = gv(p.nrpn, p.def);
        return html`<div class="param-row">
          <label>${p.label}</label>
          <input type="range" min=${p.min} max=${p.max} value=${v}
            oninput=${e => { sv(p.nrpn, parseInt(e.target.value)); render(); }} />
          <span class="val">${v}</span>
        </div>`;
      })}
    </div>`}
  </div>`;
}

function renderSeq() {
  const p = pat();
  const ll = Object.entries(LEN_MAP).find(([,v])=>v===S.stepLen)?.[0]||'?';
  return html`<div>
    <div style="margin-bottom:6px;display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <span>Pat: <b>${p.name}</b></span>
      <span>Len: ${p.len}</span>
      <span>StepLen: ${ll}/16</span>
      <span style="color:#555;font-size:11px">Q-P/A-J=notes | SPACE=commit | BKSP=clear | 1-9=len | Arrows=nav</span>
    </div>
    <div class="step-grid">
      ${p.steps.slice(0,p.len).map((st,i) =>
        html`<div class=${'step'+(i===S.cursor?' cursor':'')+(st.notes.length?' has-notes':'')}
          onclick=${() => { S.cursor=i; drawRoll(); render(); }}>
          ${st.notes.length ? st.notes.map(n=>NOTE_NAMES[n.pitch%12]).join(' ') : (i===S.cursor?'_':'·')}
        </div>`
      )}
    </div>
  </div>`;
}

function renderPatterns() {
  return html`<div>
    <div class="pat-grid">
      ${S.patterns.map((p,i) =>
        html`<div class=${'pat'+(i===S.patIdx?' active':'')}
          onclick=${() => { S.patIdx=i; S.cursor=0; drawRoll(); render(); }}>
          <b>${p.name}</b>
          <span>${p.len}st</span>
        </div>`
      )}
    </div>
    <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <button class="btn btn-sm" onclick=${() => {
        const src=pat(), ni=(S.patIdx+1)%16;
        S.patterns[ni].steps=src.steps.map(s=>({...s,notes:s.notes.map(n=>({...n}))}));
        S.patterns[ni].len=src.len; render();
      }}>Copy→Next</button>
      <button class="btn btn-sm btn-error" onclick=${() => {
        pat().steps.forEach(s=>{ s.notes=[]; }); drawRoll(); render();
      }}>Clear</button>
      <span style="color:#888">Len:</span>
      ${[8,16,32,64].map(n =>
        html`<button class=${'btn btn-sm'+(pat().len===n?' btn-primary':'')}
          onclick=${() => { pat().len=n; if(S.cursor>=n) S.cursor=n-1; drawRoll(); render(); }}>${n}</button>`
      )}
    </div>
    <div style="margin-top:12px">
      <b>Song Chain</b>
      <div style="margin-top:4px;line-height:2">
        ${Array.from({length:16},(_,i) =>
          html`<span class=${'chain-slot'+(S.chain[i]!==undefined?' filled':'')}
            onclick=${() => {
              if(S.chain[i]!==undefined) S.chain.splice(i,1); else S.chain[i]=S.patIdx;
              render();
            }}>
            ${S.chain[i]!==undefined ? S.chain[i]+1 : '+'}
          </span>`
        )}
      </div>
      <button class="btn btn-sm btn-error" style="margin-top:4px"
        onclick=${() => { S.chain=[]; render(); }}>Clear Chain</button>
    </div>
  </div>`;
}

function render() {
  const ok = !!S.midi.output;
  const TABS = ['seq','patch','patterns','midi','sysex'];
  const TLBL = {seq:'Sequencer',patch:'Patch Editor',patterns:'Patterns',midi:'MIDI',sysex:'SysEx'};
  applyDiff(document.getElementById('app'),
    html`<div id="app">
      <div id="toolbar">
        <b style="color:#4a9eff;margin-right:4px">Micron</b>
        <button class=${'btn btn-sm '+(S.playing?'btn-error':'btn-primary')}
          onclick=${() => togglePlay()}>${S.playing?'Stop':'Play'}</button>
        <label style="color:#888">BPM</label>
        <input type="number" style="width:58px" value=${S.bpm} min="20" max="300"
          oninput=${e => { S.bpm=Math.max(20,Math.min(300,parseInt(e.target.value)||120)); }} />
        <span class=${'midi-dot'+(ok?' ok':'')}></span>
        ${TABS.map(t =>
          html`<button class=${'btn btn-sm '+(S.tab===t?'btn-primary':'')}
            onclick=${() => { S.tab=t; render(); }}>${TLBL[t]}</button>`
        )}
      </div>
      <div id="roll-wrap">
        <canvas id="roll"></canvas>
      </div>
      <div id="panel">
        ${S.tab==='seq'      ? renderSeq()      : null}
        ${S.tab==='patch'    ? renderPatch()     : null}
        ${S.tab==='patterns' ? renderPatterns()  : null}
        ${S.tab==='midi'     ? renderMidi()      : null}
        ${S.tab==='sysex'    ? renderSysex()     : null}
      </div>
    </div>`
  );
  if (!RC || !document.getElementById('roll')) setTimeout(initCanvas, 0);
  else drawRoll();
}

// 9. INIT
render();
setTimeout(initCanvas, 50);
document.addEventListener('keydown', onKeyDown);
requestAnimationFrame(pollGamepad);
initMIDI();
window.S = S;
window.sendNRPN = sendNRPN;
</script>
</body>
</html>
