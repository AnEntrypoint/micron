<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alesis Micron Editor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rippleui@1.12.1/dist/css/styles.css">
<style>
  :root { --piano-w: 56px; --step-w: 22px; --row-h: 14px; }
  body { background:#0f1117; color:#e2e8f0; font-family:system-ui,sans-serif; margin:0; overflow:hidden; height:100vh; display:flex; flex-direction:column; }
  #app { display:flex; flex-direction:column; height:100vh; }
  .tab-bar { display:flex; gap:2px; padding:6px 8px 0; background:#0f1117; border-bottom:1px solid #2d3748; flex-shrink:0; }
  .tab { padding:6px 14px; border-radius:6px 6px 0 0; cursor:pointer; font-size:13px; background:#1a202c; color:#a0aec0; border:1px solid #2d3748; border-bottom:none; }
  .tab.active { background:#2d3748; color:#fff; }
  .panel { flex:1; overflow:auto; padding:12px; display:none; }
  .panel.active { display:flex; flex-direction:column; gap:8px; }
  /* Piano Roll */
  #seq-panel { padding:0; overflow:hidden; }
  #seq-panel.active { flex-direction:column; padding:0; }
  #seq-toolbar { display:flex; align-items:center; gap:8px; padding:8px 10px; background:#1a202c; border-bottom:1px solid #2d3748; flex-shrink:0; flex-wrap:wrap; }
  #seq-toolbar label { font-size:12px; color:#a0aec0; }
  #piano-roll-wrap { flex:1; display:flex; overflow:hidden; position:relative; }
  canvas#piano-roll { display:block; cursor:crosshair; touch-action:none; }
  canvas#piano-keys { display:block; flex-shrink:0; }
  #roll-scroll-x { overflow-x:scroll; overflow-y:hidden; flex:1; display:flex; flex-direction:column; }
  #roll-inner { display:flex; flex-direction:column; flex:1; overflow:hidden; position:relative; }
  /* Patch editor */
  .param-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:8px; }
  .param-card { background:#1a202c; border:1px solid #2d3748; border-radius:8px; padding:10px; }
  .param-label { font-size:11px; color:#718096; margin-bottom:4px; display:flex; justify-content:space-between; }
  .param-val { font-size:12px; color:#63b3ed; font-weight:600; }
  input[type=range] { width:100%; accent-color:#4299e1; cursor:pointer; }
  select, input[type=number] { background:#2d3748; color:#e2e8f0; border:1px solid #4a5568; border-radius:4px; padding:3px 6px; font-size:12px; }
  .section-title { font-size:13px; font-weight:700; color:#90cdf4; margin:8px 0 4px; padding-bottom:4px; border-bottom:1px solid #2d3748; }
  .mod-table { width:100%; border-collapse:collapse; font-size:12px; }
  .mod-table th { background:#1a202c; color:#718096; padding:4px 6px; text-align:left; border-bottom:1px solid #2d3748; }
  .mod-table td { padding:3px 4px; border-bottom:1px solid #1a202c; }
  .mod-table select { width:100%; min-width:90px; }
  .midi-status { display:inline-block; width:10px; height:10px; border-radius:50%; background:#e53e3e; margin-right:6px; }
  .midi-status.ok { background:#48bb78; }
  .debounce-bar { height:3px; background:#4299e1; transition:width 0.05s linear; border-radius:2px; }
  .step-info { font-size:11px; color:#718096; }
  #gamepad-indicator { font-size:11px; color:#4a5568; }
  #gamepad-indicator.active { color:#48bb78; }
  .sub-tab-bar { display:flex; gap:4px; margin-bottom:8px; flex-wrap:wrap; }
  .sub-tab { padding:4px 10px; border-radius:4px; cursor:pointer; font-size:12px; background:#1a202c; color:#a0aec0; border:1px solid #2d3748; }
  .sub-tab.active { background:#2b6cb0; color:#fff; border-color:#2b6cb0; }
  .sub-panel { display:none; }
  .sub-panel.active { display:block; }
  .pattern-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
  .pattern-card { background:#1a202c; border:1px solid #2d3748; border-radius:8px; padding:10px; cursor:pointer; }
  .pattern-card.active { border-color:#4299e1; }
  .pattern-card h4 { margin:0 0 6px; font-size:13px; }
  .chain-list { display:flex; flex-wrap:wrap; gap:4px; padding:8px; background:#1a202c; border-radius:6px; min-height:40px; }
  .chain-item { background:#2d3748; padding:3px 8px; border-radius:4px; font-size:12px; cursor:pointer; }
  .chain-item:hover { background:#e53e3e; }
  button.sm { padding:3px 8px; font-size:11px; border-radius:4px; cursor:pointer; background:#2d3748; color:#e2e8f0; border:1px solid #4a5568; }
  button.sm:hover { background:#4a5568; }
  button.primary { background:#2b6cb0; border-color:#2b6cb0; color:#fff; }
  button.primary:hover { background:#2c5282; }
  button.danger { background:#742a2a; border-color:#742a2a; color:#fff; }
  button.danger:hover { background:#9b2c2c; }
  .bpm-input { width:64px; }
  .fx-params { margin-top:8px; padding:8px; background:#0f1117; border-radius:6px; }
</style>
</head>
<body>
<div id="app">
  <div class="tab-bar" id="main-tabs"></div>
  <div id="seq-panel" class="panel"></div>
  <div id="patch-panel" class="panel"></div>
  <div id="pattern-panel" class="panel"></div>
  <div id="midi-panel" class="panel"></div>
</div>

<script type="module">
// ── State ────────────────────────────────────────────────────────────────────
const S = {
  midi: { access: null, output: null, outputs: [], channel: 1 },
  activeTab: 'seq',
  activePatchTab: 'osc',
  transport: { playing: false, recording: false, bpm: 120, step: 0, startTime: 0, audioCtx: null },
  seq: {
    patterns: Array.from({length:16},(_,i)=>({name:`Pat ${i+1}`,steps:Array.from({length:16},()=>({notes:[],len:1/16})),length:16})),
    activePattern: 0,
    chain: [],
    chainPos: 0,
    cursor: 0,
    pendingNotes: [],
    debounceTimer: null,
    debounceStart: 0,
    zoomX: 1, zoomY: 1,
    scrollX: 0, scrollY: 60,
    stepLen: 1/16,
    viewStep: 0
  },
  patch: buildDefaultPatch(),
  gamepad: { connected: false, axes: [0,0,0,0] }
};

function buildDefaultPatch() {
  const p = {};
  ALL_PARAMS.forEach(param => { p[param.nrpn] = param.def ?? 0; });
  return p;
}

// ── NRPN Parameter Definitions ───────────────────────────────────────────────
const OSC_WAVES = ['Sawtooth','Square','Triangle','Sine','Exponent','Pulse+Saw','WhiteNoise','PinkNoise'];
const FILT_MODES = ['Lowpass 4P','Lowpass 2P','Highpass 2P','Bandpass 2P','Notch 2P','Phaser 2P'];
const MOD_SOURCES = ['None','LFO1','LFO2','S/H','Env1','Env2','Env3','Pitch','ModWheel','Velocity','KeyTrack','Aftertouch','Breath','Sustain','ExtAudio','Step','PitchBend'];
const MOD_DESTS = ['None','Osc1Pitch','Osc2Pitch','Osc3Pitch','Osc1Fine','Osc2Fine','Osc3Fine','Osc1Wave','Osc2Wave','Osc3Wave','OscPW','Osc1Sync','Osc2Sync','Osc3Sync','Filt1Cutoff','Filt2Cutoff','Filt1Res','Filt2Res','Filt1Bal','Filt2Bal','Env1Atk','Env2Atk','Env3Atk','LFO1Rate','LFO2Rate','SHRate','OutputLevel','Pan','FXBalance','Osc1Level','Osc2Level','Osc3Level','RingLevel','NoiseLevel','ExtLevel'];
const FX1_TYPES = ['bypass','pitchfx','chorus','flanger','phaser super','phaser string','vocoder'];
const FX2_TYPES = ['bypass','delay mono','delay stereo','delay split','reverb hall','reverb plate','reverb room'];
const TRACK_INPUTS = ['Internal','External','Both'];

function osc(n, base) {
  return [
    {id:`osc${n}pitch`,label:`Osc${n} Pitch`,nrpn:base+0,min:-120,max:120,def:0,tab:'osc',group:`Osc ${n}`},
    {id:`osc${n}fine`,label:`Osc${n} Fine`,nrpn:base+1,min:-99,max:99,def:0,tab:'osc',group:`Osc ${n}`},
    {id:`osc${n}wave`,label:`Osc${n} Wave`,nrpn:base+2,min:0,max:7,def:0,tab:'osc',group:`Osc ${n}`,type:'select',options:OSC_WAVES},
    {id:`osc${n}pw`,label:`Osc${n} PulseWave`,nrpn:base+3,min:0,max:127,def:64,tab:'osc',group:`Osc ${n}`},
    {id:`osc${n}sync`,label:`Osc${n} SyncTune`,nrpn:base+4,min:-120,max:120,def:0,tab:'osc',group:`Osc ${n}`},
    {id:`osc${n}fem`,label:`Osc${n} Fem Amt`,nrpn:base+5,min:-99,max:99,def:0,tab:'osc',group:`Osc ${n}`},
    {id:`osc${n}fm`,label:`Osc${n} FM Amt`,nrpn:base+6,min:0,max:127,def:0,tab:'osc',group:`Osc ${n}`},
  ];
}

function filt(n, base) {
  return [
    {id:`filt${n}cut`,label:`Filt${n} Cutoff`,nrpn:base,min:0,max:127,def:127,tab:'filter',group:`Filter ${n}`},
    {id:`filt${n}res`,label:`Filt${n} Resonance`,nrpn:base+1,min:0,max:127,def:0,tab:'filter',group:`Filter ${n}`},
    {id:`filt${n}mode`,label:`Filt${n} Mode`,nrpn:base+2,min:0,max:5,def:0,tab:'filter',group:`Filter ${n}`,type:'select',options:FILT_MODES},
    {id:`filt${n}bal`,label:`Filt${n} Balance`,nrpn:base+3,min:0,max:127,def:64,tab:'filter',group:`Filter ${n}`},
    {id:`filt${n}poly`,label:`Filt${n} PolyFilt`,nrpn:base+4,min:0,max:1,def:0,tab:'filter',group:`Filter ${n}`,type:'toggle'},
    {id:`filt${n}track`,label:`Filt${n} Tracking`,nrpn:base+5,min:0,max:127,def:0,tab:'filter',group:`Filter ${n}`},
    {id:`filt${n}key`,label:`Filt${n} KeyTrack`,nrpn:base+6,min:0,max:127,def:0,tab:'filter',group:`Filter ${n}`},
  ];
}

function env(n, base) {
  return [
    {id:`env${n}atkt`,label:`Env${n} Atk Time`,nrpn:base,min:0,max:127,def:0,tab:'env',group:`Env ${n}`},
    {id:`env${n}atks`,label:`Env${n} Atk Slope`,nrpn:base+1,min:0,max:127,def:64,tab:'env',group:`Env ${n}`},
    {id:`env${n}dcyt`,label:`Env${n} Dcy Time`,nrpn:base+2,min:0,max:127,def:64,tab:'env',group:`Env ${n}`},
    {id:`env${n}dcys`,label:`Env${n} Dcy Slope`,nrpn:base+3,min:0,max:127,def:64,tab:'env',group:`Env ${n}`},
    {id:`env${n}sust`,label:`Env${n} Sus Time`,nrpn:base+4,min:0,max:127,def:127,tab:'env',group:`Env ${n}`},
    {id:`env${n}susl`,label:`Env${n} Sus Level`,nrpn:base+5,min:0,max:127,def:80,tab:'env',group:`Env ${n}`},
    {id:`env${n}relt`,label:`Env${n} Rel Time`,nrpn:base+6,min:0,max:127,def:32,tab:'env',group:`Env ${n}`},
    {id:`env${n}rels`,label:`Env${n} Rel Slope`,nrpn:base+7,min:0,max:127,def:64,tab:'env',group:`Env ${n}`},
    {id:`env${n}vel`,label:`Env${n} Velocity`,nrpn:base+8,min:0,max:127,def:64,tab:'env',group:`Env ${n}`},
    {id:`env${n}reset`,label:`Env${n} Reset`,nrpn:base+9,min:0,max:1,def:0,tab:'env',group:`Env ${n}`,type:'toggle'},
    {id:`env${n}free`,label:`Env${n} Freerun`,nrpn:base+10,min:0,max:1,def:0,tab:'env',group:`Env ${n}`,type:'toggle'},
    {id:`env${n}loop`,label:`Env${n} Loop`,nrpn:base+11,min:0,max:1,def:0,tab:'env',group:`Env ${n}`,type:'toggle'},
    {id:`env${n}susp`,label:`Env${n} SusPedal`,nrpn:base+12,min:0,max:1,def:1,tab:'env',group:`Env ${n}`,type:'toggle'},
  ];
}

function lfo(n, id, base) {
  return [
    {id:`${id}sync`,label:`${n} TempoSync`,nrpn:base,min:0,max:1,def:0,tab:'lfo',group:n,type:'toggle'},
    {id:`${id}rate0`,label:`${n} Rate (sync off)`,nrpn:base+1,min:0,max:127,def:64,tab:'lfo',group:n},
    {id:`${id}rate1`,label:`${n} Rate (sync on)`,nrpn:base+2,min:0,max:127,def:8,tab:'lfo',group:n},
    {id:`${id}reset`,label:`${n} Reset`,nrpn:base+3,min:0,max:1,def:0,tab:'lfo',group:n,type:'toggle'},
    {id:`${id}mi`,label:`${n} MI Slider`,nrpn:base+4,min:0,max:127,def:0,tab:'lfo',group:n},
  ];
}

function modSlot(n) {
  const base = 150 + (n-1)*4;
  return [
    {id:`mod${n}src`,label:`Mod${n} Source`,nrpn:base,min:0,max:MOD_SOURCES.length-1,def:0,tab:'mod',group:`Mod ${n}`,type:'select',options:MOD_SOURCES},
    {id:`mod${n}dst`,label:`Mod${n} Dest`,nrpn:base+1,min:0,max:MOD_DESTS.length-1,def:0,tab:'mod',group:`Mod ${n}`,type:'select',options:MOD_DESTS},
    {id:`mod${n}lvl`,label:`Mod${n} Level`,nrpn:base+2,min:-127,max:127,def:0,tab:'mod',group:`Mod ${n}`},
    {id:`mod${n}off`,label:`Mod${n} Offset`,nrpn:base+3,min:-127,max:127,def:0,tab:'mod',group:`Mod ${n}`},
  ];
}

const ALL_PARAMS = [
  ...osc(1,0), ...osc(2,7), ...osc(3,14),
  ...filt(1,21), ...filt(2,28),
  ...env(1,35), ...env(2,48), ...env(3,61),
  ...lfo(1,'lfo1',74), ...lfo('LFO2','lfo2',79), ...lfo('S/H','sh',84),
  // FX1
  {id:'fx1type',label:'FX1 Type',nrpn:89,min:0,max:6,def:0,tab:'fx',group:'FX1',type:'select',options:FX1_TYPES},
  {id:'fx1feedbk',label:'FX1 Feedback',nrpn:90,min:0,max:127,def:0,tab:'fx',group:'FX1'},
  {id:'fx1manidly',label:'FX1 ManIDly',nrpn:91,min:0,max:127,def:64,tab:'fx',group:'FX1'},
  {id:'fx1lforate',label:'FX1 LfoRate',nrpn:92,min:0,max:127,def:64,tab:'fx',group:'FX1'},
  {id:'fx1lfodpth',label:'FX1 LfoDpth',nrpn:93,min:0,max:127,def:0,tab:'fx',group:'FX1'},
  {id:'fx1lfoshap',label:'FX1 LfoShap',nrpn:94,min:0,max:5,def:0,tab:'fx',group:'FX1'},
  {id:'fx1lfosync',label:'FX1 LfoSync',nrpn:95,min:0,max:1,def:0,tab:'fx',group:'FX1',type:'toggle'},
  {id:'fx1ntchfrq',label:'FX1 NtchFrq',nrpn:96,min:0,max:127,def:64,tab:'fx',group:'FX1'},
  // FX2
  {id:'fx2type',label:'FX2 Type',nrpn:97,min:0,max:6,def:0,tab:'fx',group:'FX2',type:'select',options:FX2_TYPES},
  {id:'fx2delaytm',label:'FX2 DelayTm',nrpn:98,min:0,max:127,def:64,tab:'fx',group:'FX2'},
  {id:'fx2regen',label:'FX2 Regen',nrpn:99,min:0,max:127,def:0,tab:'fx',group:'FX2'},
  {id:'fx2bright',label:'FX2 Bright',nrpn:100,min:0,max:127,def:64,tab:'fx',group:'FX2'},
  {id:'fx2sync',label:'FX2 Sync',nrpn:101,min:0,max:1,def:0,tab:'fx',group:'FX2',type:'toggle'},
  {id:'fx2dlyleft',label:'FX2 DlyLeft',nrpn:102,min:0,max:127,def:64,tab:'fx',group:'FX2'},
  {id:'fx2dlyright',label:'FX2 DlyRight',nrpn:103,min:0,max:127,def:64,tab:'fx',group:'FX2'},
  {id:'fx2diffusn',label:'FX2 Diffusn',nrpn:104,min:0,max:127,def:64,tab:'fx',group:'FX2'},
  {id:'fx2decay',label:'FX2 Decay',nrpn:105,min:0,max:127,def:64,tab:'fx',group:'FX2'},
  {id:'fx2color',label:'FX2 Color',nrpn:106,min:0,max:127,def:64,tab:'fx',group:'FX2'},
  // Track
  {id:'trackInput',label:'Track Input',nrpn:118,min:0,max:2,def:0,tab:'track',group:'Track',type:'select',options:TRACK_INPUTS},
  {id:'trackPreset',label:'Track Preset',nrpn:119,min:0,max:127,def:0,tab:'track',group:'Track'},
  {id:'trackGlide',label:'Track Glide',nrpn:120,min:0,max:127,def:0,tab:'track',group:'Track'},
  ...Array.from({length:33},(_,i)=>({id:`trackpt${i-16}`,label:`Track Point ${i-16>0?'+':''}${i-16}`,nrpn:121+i,min:0,max:127,def:64,tab:'track',group:'Tuning Table'})),
  // Mix
  {id:'osc1level',label:'Osc1 Level',nrpn:155,min:0,max:127,def:100,tab:'mix',group:'Oscillator Levels'},
  {id:'osc2level',label:'Osc2 Level',nrpn:156,min:0,max:127,def:0,tab:'mix',group:'Oscillator Levels'},
  {id:'osc3level',label:'Osc3 Level',nrpn:157,min:0,max:127,def:0,tab:'mix',group:'Oscillator Levels'},
  {id:'noiselevel',label:'Noise Level',nrpn:158,min:0,max:127,def:0,tab:'mix',group:'Mix'},
  {id:'ringlevel',label:'Ring Level',nrpn:159,min:0,max:127,def:0,tab:'mix',group:'Mix'},
  {id:'extlevel',label:'Ext Level',nrpn:160,min:0,max:127,def:0,tab:'mix',group:'Mix'},
  {id:'outlevel',label:'Output Level',nrpn:161,min:0,max:127,def:100,tab:'mix',group:'Output'},
  {id:'drivelevel',label:'Drive Level',nrpn:162,min:0,max:127,def:0,tab:'mix',group:'Output'},
  {id:'pan',label:'Pan Balance',nrpn:163,min:0,max:127,def:64,tab:'mix',group:'Output'},
  {id:'fxbal',label:'FX Balance',nrpn:164,min:0,max:127,def:64,tab:'mix',group:'Output'},
  // Mod Matrix
  ...Array.from({length:12},(_,i)=>modSlot(i+1)).flat(),
];

// ── MIDI ─────────────────────────────────────────────────────────────────────
async function initMIDI() {
  try {
    S.midi.access = await navigator.requestMIDIAccess({ sysex: false });
    S.midi.access.onstatechange = () => { updateOutputList(); render(); };
    updateOutputList();
  } catch(e) { console.warn('MIDI unavailable', e); }
  render();
}

function updateOutputList() {
  S.midi.outputs = [];
  if (!S.midi.access) return;
  S.midi.access.outputs.forEach(o => S.midi.outputs.push(o));
  if (!S.midi.output && S.midi.outputs.length) S.midi.output = S.midi.outputs[0];
}

function sendNRPN(nrpn, value) {
  if (!S.midi.output) return;
  const ch = S.midi.channel - 1;
  const msb = (nrpn >> 7) & 0x7F;
  const lsb = nrpn & 0x7F;
  const vMSB = (value >> 7) & 0x7F;
  const vLSB = value & 0x7F;
  S.midi.output.send([0xB0|ch, 99, msb]);
  S.midi.output.send([0xB0|ch, 98, lsb]);
  S.midi.output.send([0xB0|ch, 6,  vMSB]);
  S.midi.output.send([0xB0|ch, 38, vLSB]);
}

function sendNoteOn(note, vel=100) {
  if (!S.midi.output) return;
  S.midi.output.send([0x90|(S.midi.channel-1), note, vel]);
}

function sendNoteOff(note) {
  if (!S.midi.output) return;
  S.midi.output.send([0x80|(S.midi.channel-1), note, 0]);
}

// ── Piano Roll Canvas ─────────────────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BLACK_NOTES = new Set([1,3,6,8,10]);
let rollCanvas, keysCanvas, rollCtx, keysCtx;
let dragging = null, touchStart = null;

function noteLabel(n) { return NOTE_NAMES[n%12]+(Math.floor(n/12)-1); }

function initCanvases() {
  const wrap = document.getElementById('piano-roll-wrap');
  if (!wrap) return;
  wrap.innerHTML = '';

  keysCanvas = document.createElement('canvas');
  keysCanvas.id = 'piano-keys';
  keysCanvas.width = 56;
  wrap.appendChild(keysCanvas);

  rollCanvas = document.createElement('canvas');
  rollCanvas.id = 'piano-roll';
  rollCanvas.style.flex = '1';
  wrap.appendChild(rollCanvas);

  keysCtx = keysCanvas.getContext('2d');
  rollCtx = rollCanvas.getContext('2d');

  rollCanvas.addEventListener('mousedown', onRollMouseDown);
  rollCanvas.addEventListener('mousemove', onRollMouseMove);
  rollCanvas.addEventListener('mouseup', () => dragging = null);
  rollCanvas.addEventListener('wheel', onRollWheel, {passive:false});
  rollCanvas.addEventListener('touchstart', onRollTouchStart, {passive:false});
  rollCanvas.addEventListener('touchmove', onRollTouchMove, {passive:false});
  rollCanvas.addEventListener('touchend', () => dragging = null);

  const ro = new ResizeObserver(drawRoll);
  ro.observe(wrap);
  drawRoll();
}

function drawRoll() {
  if (!rollCanvas || !rollCtx) return;
  const wrap = document.getElementById('piano-roll-wrap');
  if (!wrap) return;
  const W = wrap.clientWidth - 56;
  const H = wrap.clientHeight;
  rollCanvas.width = W; rollCanvas.height = H;
  keysCanvas.width = 56; keysCanvas.height = H;

  const seq = S.seq;
  const pat = seq.patterns[seq.activePattern];
  const sw = Math.max(16, 22 * seq.zoomX);
  const rh = Math.max(8, 14 * seq.zoomY);
  const rows = Math.ceil(H / rh) + 2;
  const cols = pat.length;
  const topNote = 127 - seq.scrollY;

  // draw keys
  const kc = keysCtx;
  kc.fillStyle = '#0f1117';
  kc.fillRect(0,0,56,H);
  for (let i=0; i<rows; i++) {
    const note = topNote - i;
    if (note < 0 || note > 127) continue;
    const y = i * rh;
    const isBlack = BLACK_NOTES.has(note % 12);
    kc.fillStyle = isBlack ? '#1a202c' : '#e2e8f0';
    kc.fillRect(0, y, 54, rh-1);
    if (note % 12 === 0) {
      kc.fillStyle = '#2b6cb0';
      kc.font = `${Math.max(9,rh-3)}px monospace`;
      kc.fillText(noteLabel(note), 2, y + rh - 2);
    }
  }

  // draw roll grid
  const rc = rollCtx;
  rc.fillStyle = '#0f1117';
  rc.fillRect(0,0,W,H);

  // grid lines
  for (let i=0; i<rows; i++) {
    const note = topNote - i;
    const y = i * rh;
    const isBlack = BLACK_NOTES.has((note+128) % 12);
    if (isBlack) { rc.fillStyle='#15191f'; rc.fillRect(0,y,W,rh-1); }
    if (note % 12 === 0) { rc.strokeStyle='#2d3748'; rc.lineWidth=1; rc.beginPath(); rc.moveTo(0,y); rc.lineTo(W,y); rc.stroke(); }
  }
  for (let c=0; c<cols; c++) {
    const x = c * sw - seq.scrollX * sw;
    if (x < -sw || x > W) continue;
    rc.strokeStyle = c%4===0 ? '#4a5568' : '#2d3748';
    rc.lineWidth = c%4===0 ? 1.5 : 0.5;
    rc.beginPath(); rc.moveTo(x,0); rc.lineTo(x,H); rc.stroke();
    // step number
    if (c%4===0) {
      rc.fillStyle='#4a5568'; rc.font='10px monospace';
      rc.fillText(c+1, x+2, 10);
    }
  }

  // draw notes
  pat.steps.forEach((step, ci) => {
    const x = ci * sw - seq.scrollX * sw;
    if (x < -sw || x > W) return;
    step.notes.forEach(n => {
      const row = topNote - n.pitch;
      if (row < 0 || row >= rows + 2) return;
      const y = row * rh;
      const noteW = Math.max(4, step.len / (1/16) * sw - 2);
      rc.fillStyle = `hsl(${(n.pitch*2.8)%360},60%,50%)`;
      rc.fillRect(x+1, y+1, noteW-2, rh-3);
      if (noteW > 20) {
        rc.fillStyle='#fff'; rc.font=`${Math.max(8,rh-3)}px monospace`;
        rc.fillText(noteLabel(n.pitch), x+3, y+rh-2);
      }
    });
  });

  // cursor highlight
  const cx = seq.cursor * sw - seq.scrollX * sw;
  rc.fillStyle = 'rgba(255,255,255,0.08)';
  rc.fillRect(cx, 0, sw-1, H);
  rc.strokeStyle = '#63b3ed';
  rc.lineWidth = 2;
  rc.strokeRect(cx, 0, sw-1, H);

  // playhead
  if (S.transport.playing) {
    const px = seq.step * sw - seq.scrollX * sw;
    rc.strokeStyle = '#f6e05e';
    rc.lineWidth = 2;
    rc.beginPath(); rc.moveTo(px,0); rc.lineTo(px,H); rc.stroke();
  }
}

function getRollNoteAt(x, y) {
  const seq = S.seq;
  const pat = seq.patterns[seq.activePattern];
  const sw = Math.max(16, 22 * seq.zoomX);
  const rh = Math.max(8, 14 * seq.zoomY);
  const topNote = 127 - seq.scrollY;
  const col = Math.floor((x + seq.scrollX * sw) / sw);
  const row = Math.floor(y / rh);
  const pitch = topNote - row;
  return { col, pitch, valid: col >= 0 && col < pat.length && pitch >= 0 && pitch <= 127 };
}

function onRollMouseDown(e) {
  const { col, pitch, valid } = getRollNoteAt(e.offsetX, e.offsetY);
  if (!valid) return;
  const step = S.seq.patterns[S.seq.activePattern].steps[col];
  if (e.button === 2) {
    step.notes = step.notes.filter(n => n.pitch !== pitch);
  } else {
    const exists = step.notes.findIndex(n => n.pitch === pitch);
    if (exists >= 0) {
      dragging = { col, pitch, mode:'resize' };
    } else {
      step.notes.push({ pitch, vel:100 });
      dragging = { col, pitch, mode:'move' };
    }
    S.seq.cursor = col;
  }
  drawRoll(); updateDebounceBar();
}

function onRollMouseMove(e) {
  if (!dragging) return;
  const sw = Math.max(16, 22 * S.seq.zoomX);
  if (dragging.mode === 'resize') {
    const step = S.seq.patterns[S.seq.activePattern].steps[dragging.col];
    const dx = e.offsetX - (dragging.col * sw - S.seq.scrollX * sw);
    step.len = Math.max(1/64, Math.round(dx / sw * 16) / 16);
    drawRoll();
  }
}

function onRollWheel(e) {
  e.preventDefault();
  if (e.ctrlKey) {
    S.seq.zoomX = Math.max(0.5, Math.min(4, S.seq.zoomX - e.deltaY * 0.01));
  } else if (e.shiftKey) {
    S.seq.zoomY = Math.max(0.5, Math.min(4, S.seq.zoomY - e.deltaY * 0.01));
  } else {
    S.seq.scrollX = Math.max(0, S.seq.scrollX + e.deltaX * 0.02);
    S.seq.scrollY = Math.max(0, Math.min(120, S.seq.scrollY + e.deltaY * 0.1));
  }
  drawRoll();
}

let lastPinchDist = null;
function onRollTouchStart(e) {
  e.preventDefault();
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastPinchDist = Math.sqrt(dx*dx+dy*dy);
  } else if (e.touches.length === 1) {
    const r = rollCanvas.getBoundingClientRect();
    const x = e.touches[0].clientX - r.left;
    const y = e.touches[0].clientY - r.top;
    onRollMouseDown({ offsetX:x, offsetY:y, button:0 });
  }
}
function onRollTouchMove(e) {
  e.preventDefault();
  if (e.touches.length === 2 && lastPinchDist) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const scale = dist / lastPinchDist;
    S.seq.zoomX = Math.max(0.5, Math.min(4, S.seq.zoomX * scale));
    lastPinchDist = dist;
    drawRoll();
  }
}

// ── Step Sequencer Keyboard ───────────────────────────────────────────────────
const KEY_NOTES = {
  'q':60,'2':61,'w':62,'3':63,'e':64,'r':65,'5':66,'t':67,'6':68,'y':69,'7':70,'u':71,
  'i':72,'9':73,'o':74,'0':75,'p':76,
  'a':48,'w':49,'s':50,'e':51,'d':52,'f':53,'t':54,'g':55,'y':56,'h':57,'u':58,'j':59,
};
// Cleaner layout — Row1=white keys C4-E5, Row2=white keys C3-B3
const QWERTY_MAP = {
  'q':60,'w':62,'e':64,'r':65,'t':67,'y':69,'u':71,'i':72,'o':74,'p':76,
  'a':48,'s':50,'d':52,'f':53,'g':55,'h':57,'j':59,'k':60,
  '2':61,'3':63,'5':66,'6':68,'7':70, // black keys row1
  'q':60 // overridden below
};
// Final clean mapping
const KEY_MAP = {
  q:60,w:62,e:64,r:65,t:67,y:69,u:71,i:72,o:74,p:76,
  a:48,s:50,d:52,f:53,g:55,h:57,j:59,k:60,
  '2':61,'3':63,'5':66,'6':68,'7':70,
  'q':60
};
// Actually use a map without duplicates
const FINAL_KEY_MAP = new Map([
  ['q',60],['w',62],['e',64],['r',65],['t',67],['y',69],['u',71],['i',72],['o',74],['p',76],
  ['a',48],['s',50],['d',52],['f',53],['g',55],['h',57],['j',59],['k',60],
  ['2',61],['3',63],['5',66],['6',68],['7',70],
]);

const STEP_LEN_MAP = {'1':1/16,'2':1/8,'3':1/4,'4':1/2,'5':1,'6':1.5,'7':2,'8':3,'9':4};
const DEBOUNCE_MS = 2000;
let debounceProgress = 0;

function handleKeyDown(e) {
  // Ignore if typing in input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT' || e.target.tagName === 'TEXTAREA') return;
  const key = e.key.toLowerCase();

  if (key === ' ') {
    e.preventDefault();
    commitStep();
    return;
  }
  if (key === 'backspace') {
    e.preventDefault();
    clearCurrentStep();
    return;
  }
  if (key === 'arrowleft') { e.preventDefault(); S.seq.cursor = Math.max(0, S.seq.cursor-1); drawRoll(); return; }
  if (key === 'arrowright') { e.preventDefault(); S.seq.cursor = Math.min(S.seq.patterns[S.seq.activePattern].length-1, S.seq.cursor+1); drawRoll(); return; }
  if (key === 'arrowup') { e.preventDefault(); S.seq.scrollY = Math.max(0,S.seq.scrollY-1); drawRoll(); return; }
  if (key === 'arrowdown') { e.preventDefault(); S.seq.scrollY = Math.min(120,S.seq.scrollY+1); drawRoll(); return; }

  if (STEP_LEN_MAP[key]) { S.seq.stepLen = STEP_LEN_MAP[key]; updateDebounceBar(); return; }
  if (e.code && e.code.startsWith('Numpad')) {
    const n = e.code.replace('Numpad','');
    if (STEP_LEN_MAP[n]) { S.seq.stepLen = STEP_LEN_MAP[n]; updateDebounceBar(); return; }
  }

  const pitch = FINAL_KEY_MAP.get(key);
  if (pitch !== undefined) {
    e.preventDefault();
    addPendingNote(pitch);
  }
}

function addPendingNote(pitch) {
  const now = performance.now();
  const expired = !S.seq.debounceTimer || (now - S.seq.debounceStart) > DEBOUNCE_MS;
  if (expired) S.seq.pendingNotes = [];
  if (!S.seq.pendingNotes.find(n=>n.pitch===pitch)) {
    S.seq.pendingNotes.push({pitch, vel:100});
  }
  S.seq.debounceStart = now;
  clearTimeout(S.seq.debounceTimer);
  S.seq.debounceTimer = setTimeout(()=>{ S.seq.debounceTimer=null; updateDebounceBar(); }, DEBOUNCE_MS);
  // Preview note
  sendNoteOn(pitch);
  setTimeout(()=>sendNoteOff(pitch), 200);
  // Place on current step immediately (will be replaced if more notes come)
  const step = S.seq.patterns[S.seq.activePattern].steps[S.seq.cursor];
  step.notes = [...S.seq.pendingNotes];
  step.len = S.seq.stepLen;
  drawRoll(); updateDebounceBar();
}

function commitStep() {
  const pat = S.seq.patterns[S.seq.activePattern];
  if (S.seq.pendingNotes.length === 0) {
    // rest — clear step
    pat.steps[S.seq.cursor].notes = [];
  }
  S.seq.pendingNotes = [];
  clearTimeout(S.seq.debounceTimer);
  S.seq.debounceTimer = null;
  S.seq.cursor = Math.min(pat.length-1, S.seq.cursor+1);
  // Auto-scroll cursor into view
  const sw = Math.max(16, 22 * S.seq.zoomX);
  const rollW = rollCanvas ? rollCanvas.width : 400;
  const visSteps = Math.floor(rollW / sw);
  if (S.seq.cursor >= S.seq.scrollX + visSteps) S.seq.scrollX = S.seq.cursor - visSteps + 1;
  drawRoll(); updateDebounceBar();
}

function clearCurrentStep() {
  S.seq.patterns[S.seq.activePattern].steps[S.seq.cursor].notes = [];
  S.seq.pendingNotes = [];
  drawRoll();
}

function updateDebounceBar() {
  const bar = document.getElementById('debounce-bar');
  if (!bar) return;
  if (!S.seq.debounceTimer) { bar.style.width='0%'; return; }
  const elapsed = performance.now() - S.seq.debounceStart;
  const pct = Math.max(0, 100 - (elapsed/DEBOUNCE_MS)*100);
  bar.style.width = pct+'%';
  if (S.seq.debounceTimer) requestAnimationFrame(updateDebounceBar);
}

document.addEventListener('keydown', handleKeyDown);

// ── Transport / Playback ──────────────────────────────────────────────────────
function getAudioCtx() {
  if (!S.transport.audioCtx) S.transport.audioCtx = new AudioContext();
  if (S.transport.audioCtx.state === 'suspended') S.transport.audioCtx.resume();
  return S.transport.audioCtx;
}

let schedulerTimer = null;
let nextStepTime = 0;
const LOOKAHEAD = 0.1;

function stepDuration() { return 60 / S.transport.bpm / 4; }

function scheduleStep(stepIdx, time) {
  const pat = getCurrentPattern();
  const step = pat.steps[stepIdx];
  step.notes.forEach(n => {
    sendNoteOn(n.pitch, n.vel || 100);
    const dur = Math.max(0.05, step.len / (1/16) * stepDuration() * 0.9);
    setTimeout(()=>sendNoteOff(n.pitch), (dur + time - getAudioCtx().currentTime)*1000);
  });
}

function getCurrentPattern() {
  if (S.seq.chain.length > 0) {
    const pi = S.seq.chain[S.seq.chainPos % S.seq.chain.length];
    return S.seq.patterns[pi];
  }
  return S.seq.patterns[S.seq.activePattern];
}

function scheduler() {
  if (!S.transport.playing) return;
  const ctx = getAudioCtx();
  while (nextStepTime < ctx.currentTime + LOOKAHEAD) {
    scheduleStep(S.seq.step, nextStepTime);
    S.seq.step = (S.seq.step + 1) % getCurrentPattern().length;
    if (S.seq.step === 0 && S.seq.chain.length > 0) {
      S.seq.chainPos = (S.seq.chainPos+1) % S.seq.chain.length;
    }
    nextStepTime += stepDuration();
    drawRoll();
  }
  schedulerTimer = setTimeout(scheduler, 25);
}

function togglePlay() {
  S.transport.playing = !S.transport.playing;
  if (S.transport.playing) {
    const ctx = getAudioCtx();
    S.seq.step = 0; S.seq.chainPos = 0;
    nextStepTime = ctx.currentTime;
    scheduler();
  } else {
    clearTimeout(schedulerTimer);
    // All notes off
    for (let i=0;i<128;i++) sendNoteOff(i);
  }
  render();
}

// ── Gamepad ───────────────────────────────────────────────────────────────────
let lastGamepadState = null;
function pollGamepad() {
  const gp = navigator.getGamepads && navigator.getGamepads()[0];
  if (gp) {
    S.gamepad.connected = true;
    const [lx,ly] = gp.axes;
    // D-pad / left stick navigation
    if (gp.buttons[14]?.pressed || lx < -0.5) { S.seq.cursor = Math.max(0,S.seq.cursor-1); drawRoll(); }
    if (gp.buttons[15]?.pressed || lx > 0.5) { S.seq.cursor = Math.min(getCurrentPattern().length-1,S.seq.cursor+1); drawRoll(); }
    if (gp.buttons[12]?.pressed || ly < -0.5) { S.seq.scrollY = Math.max(0,S.seq.scrollY-1); drawRoll(); }
    if (gp.buttons[13]?.pressed || ly > 0.5) { S.seq.scrollY = Math.min(120,S.seq.scrollY+1); drawRoll(); }
    // A = commit, B = clear
    if (gp.buttons[0]?.pressed && (!lastGamepadState || !lastGamepadState.buttons[0]?.pressed)) commitStep();
    if (gp.buttons[1]?.pressed && (!lastGamepadState || !lastGamepadState.buttons[1]?.pressed)) clearCurrentStep();
    // Triggers = zoom
    if (gp.buttons[6]?.value > 0.1) { S.seq.zoomX = Math.max(0.5, S.seq.zoomX - 0.02); drawRoll(); }
    if (gp.buttons[7]?.value > 0.1) { S.seq.zoomX = Math.min(4, S.seq.zoomX + 0.02); drawRoll(); }
    lastGamepadState = { buttons: gp.buttons.map(b=>({pressed:b.pressed,value:b.value})) };
  } else {
    S.gamepad.connected = false;
  }
  requestAnimationFrame(pollGamepad);
}
requestAnimationFrame(pollGamepad);

        <td><select onchange="setPatch(${base+1},+this.value)">${MOD_DESTS.map((s,i)=>`<option value="${i}"${i===dst?' selected':''}>${s}</option>`).join('')}</select></td>
        <td><input type="range" min="-127" max="127" value="${lvl}" style="width:80px"
          oninput="setPatch(${base+2},+this.value);this.nextElementSibling.textContent=this.value"><span style="font-size:11px;margin-left:4px">${lvl}</span></td>
        <td><input type="range" min="-127" max="127" value="${off}" style="width:80px"
          oninput="setPatch(${base+3},+this.value);this.nextElementSibling.textContent=this.value"><span style="font-size:11px;margin-left:4px">${off}</span></td>
      </tr>`;
    }).join('')}</tbody>
  </table></div>`;
}

// ── Pattern Manager ───────────────────────────────────────────────────────────
function renderPattern() {
  const el = document.getElementById('pattern-panel');
  const pats = S.seq.patterns;
  const chain = S.seq.chain;
  el.innerHTML = `
    <div class="section-title">Patterns</div>
    <div class="pattern-grid">
      ${pats.map((p,i)=>`
        <div class="pattern-card${i===S.seq.activePattern?' active':''}" onclick="selectPattern(${i})">
          <h4><input type="text" value="${p.name}" style="background:transparent;border:none;color:inherit;width:100%;font-size:13px;font-weight:700"
            onchange="S.seq.patterns[${i}].name=this.value;renderPattern()" onclick="event.stopPropagation()"></h4>
          <div style="font-size:11px;color:#718096">${p.length} steps</div>
          <div style="display:flex;gap:4px;margin-top:6px">
            <button class="sm" onclick="event.stopPropagation();copyPattern(${i})">Copy</button>
            <button class="sm" onclick="event.stopPropagation();pastePattern(${i})">Paste</button>
            <button class="sm danger" onclick="event.stopPropagation();clearPattern(${i})">Clear</button>
            <button class="sm" onclick="event.stopPropagation();addToChain(${i})">+Chain</button>
          </div>
        </div>
      `).join('')}
    </div>
    <div class="section-title" style="margin-top:12px">Pattern Chain (Song Mode)</div>
    <div class="chain-list" id="chain-list">
      ${chain.map((pi,ci)=>`<div class="chain-item" onclick="removeFromChain(${ci})">${pats[pi].name}</div>`).join('')}
      ${chain.length===0?'<span style="color:#4a5568;font-size:12px">No patterns in chain — click +Chain to add</span>':''}
    </div>
    <div style="margin-top:6px;font-size:11px;color:#718096">Click chain item to remove it</div>`;
}

window.selectPattern = function(i) { S.seq.activePattern=i; renderPattern(); drawRoll(); };
let clipboard = null;
window.copyPattern = function(i) { clipboard = JSON.parse(JSON.stringify(S.seq.patterns[i])); };
window.pastePattern = function(i) { if(clipboard) { S.seq.patterns[i]=JSON.parse(JSON.stringify(clipboard)); renderPattern(); } };
window.clearPattern = function(i) {
  const p = S.seq.patterns[i];
  p.steps = Array.from({length:p.length},()=>({notes:[],len:S.seq.stepLen}));
  renderPattern(); if(i===S.seq.activePattern) drawRoll();
};
window.addToChain = function(i) { S.seq.chain.push(i); renderPattern(); };
window.removeFromChain = function(ci) { S.seq.chain.splice(ci,1); renderPattern(); };
window.renderPattern = renderPattern;

// ── MIDI Panel ────────────────────────────────────────────────────────────────
function renderMidi() {
  const el = document.getElementById('midi-panel');
  const ok = S.midi.output != null;
  el.innerHTML = `
    <div class="section-title">MIDI Connection</div>
    <div style="display:flex;flex-direction:column;gap:12px;max-width:400px">
      <div>
        <label style="display:block;margin-bottom:4px;font-size:12px;color:#a0aec0">MIDI Output</label>
        <select style="width:100%" onchange="selectOutput(this.value)">
          <option value="">— Select device —</option>
          ${S.midi.outputs.map(o=>`<option value="${o.id}"${S.midi.output?.id===o.id?' selected':''}>${o.name}</option>`).join('')}
        </select>
      </div>
      <div>
        <label style="display:block;margin-bottom:4px;font-size:12px;color:#a0aec0">MIDI Channel</label>
        <select onchange="S.midi.channel=+this.value">
          ${Array.from({length:16},(_,i)=>`<option value="${i+1}"${S.midi.channel===i+1?' selected':''}>Channel ${i+1}</option>`).join('')}
        </select>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="midi-status${ok?' ok':''}"></span>
        <span style="font-size:13px">${ok?`Connected: ${S.midi.output.name}`:'No device selected'}</span>
      </div>
      ${!navigator.requestMIDIAccess?'<div style="color:#fc8181;font-size:12px">Web MIDI API not supported in this browser. Use Chrome or Edge.</div>':''}
      <button class="sm primary" onclick="refreshMIDI()">Refresh Devices</button>
      <div style="margin-top:8px">
        <div class="section-title">NRPN Test</div>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <label style="font-size:12px">NRPN# <input type="number" value="0" min="0" max="16383" id="test-nrpn" style="width:70px"></label>
          <label style="font-size:12px">Value <input type="number" value="64" min="0" max="16383" id="test-val" style="width:70px"></label>
          <button class="sm" onclick="testNRPN()">Send</button>
        </div>
      </div>
    </div>`;
}

window.selectOutput = function(id) {
  S.midi.output = S.midi.outputs.find(o=>o.id===id) || null;
  renderMidi();
};
window.refreshMIDI = function() { updateOutputList(); renderMidi(); };
window.testNRPN = function() {
  const n = +document.getElementById('test-nrpn').value;
  const v = +document.getElementById('test-val').value;
  sendNRPN(n, v);
};

// ── Init ──────────────────────────────────────────────────────────────────────
initMIDI();
render();
setTimeout(initCanvases, 100);
</script>
</body>
</html>
