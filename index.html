<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Alesis Micron Editor</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');
:root {
  --bg:#08090d;--panel:#0e1018;--panel2:#13151e;--border:#1c1f2e;
  --cyan:#00e5ff;--cyan2:#00b0cc;--orange:#ff6b00;--orange2:#cc5500;
  --green:#00e676;--red:#ff1744;--yellow:#ffd600;--purple:#d500f9;
  --text:#c8ccd8;--text2:#7a7f96;--text3:#3a3f54;
  --accent:var(--cyan);--accent2:var(--orange);
  --glow:0 0 8px var(--cyan);
}
body.light{--bg:#eef0f5;--panel:#fff;--panel2:#f5f7fa;--border:#d0d4e0;--text:#1a1d2a;--text2:#555870;--text3:#aab0c0}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:12px;overflow:hidden}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#toolbar{display:flex;align-items:center;gap:4px;padding:4px 8px;background:linear-gradient(180deg,#141624,var(--panel));border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;min-height:40px;position:relative;z-index:10}
#roll-wrap{position:relative;border-bottom:1px solid var(--border);flex-shrink:0;overflow:hidden;background:var(--bg)}
#tabs-bar{display:flex;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
#panel{flex:1;overflow-y:auto;padding:10px 12px;background:var(--panel)}
.brand{font-family:'Orbitron',sans-serif;font-weight:900;font-size:15px;color:var(--cyan);letter-spacing:2px;text-shadow:0 0 12px var(--cyan);margin-right:2px;flex-shrink:0}
.brand span{color:var(--orange)}
.tbtn{padding:3px 8px;border-radius:4px;border:1px solid var(--border);background:var(--panel2);color:var(--text2);cursor:pointer;font-size:11px;font-family:'JetBrains Mono',monospace;transition:all .1s;user-select:none;white-space:nowrap}
.tbtn:hover{border-color:var(--cyan);color:var(--text);background:#0d1a24}
.tbtn.active{background:#001a24;border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 6px #00e5ff33}
.tbtn.play{border-color:var(--green);color:var(--green)}
.tbtn.stop{border-color:var(--red);color:var(--red)}
.tbtn.warn{border-color:var(--orange);color:var(--orange)}
.tbtn.rec{border-color:#ff1744}
.tbtn.rec.on{color:#ff1744;animation:recpulse 1s infinite}
@keyframes recpulse{0%,100%{box-shadow:0 0 0 0 #ff174433}50%{box-shadow:0 0 0 5px #ff174400}}
.tab-btn{padding:6px 14px;border:none;border-right:1px solid var(--border);border-bottom:2px solid transparent;background:transparent;color:var(--text2);cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:11px;transition:all .15s;white-space:nowrap;flex-shrink:0}
.tab-btn:hover{color:var(--text);background:var(--panel2)}
.tab-btn.active{color:var(--cyan);background:var(--panel);border-bottom-color:var(--cyan)}
.sep{width:1px;height:22px;background:var(--border);flex-shrink:0;margin:0 2px}
.midi-dot{width:8px;height:8px;border-radius:50%;background:var(--border);display:inline-block;transition:all .2s;flex-shrink:0}
.midi-dot.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.midi-dot.rx{background:var(--orange);box-shadow:0 0 8px var(--orange)}
.bpm-in{width:50px;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:2px 4px;border-radius:3px;font-family:inherit;font-size:12px;text-align:center}
.bpm-in:focus{border-color:var(--cyan);outline:none}
.pos-display{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--cyan);min-width:52px;text-align:center;letter-spacing:1px}
.unsaved{font-size:10px;color:var(--orange);display:none}
.unsaved.show{display:inline}
.dbounce-ring{width:24px;height:24px;flex-shrink:0}
.step-grid{display:flex;gap:2px;flex-wrap:wrap;padding:4px 0}
.step{width:42px;height:42px;border:1px solid var(--border);border-radius:4px;background:var(--panel);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;cursor:pointer;user-select:none;overflow:hidden;transition:background .08s,border-color .08s;position:relative}
.step:hover{border-color:var(--text3)}
.step.has-notes{background:#001624;border-color:#005578}
.step.cursor{outline:2px solid var(--cyan);outline-offset:-1px;border-color:var(--cyan)}
.step.playing{background:#002030;border-color:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.step .vel-dot{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%}
.step .prob-bar{position:absolute;bottom:0;left:0;height:2px;background:var(--orange);border-radius:0 0 3px 3px}
.mini-kb{display:flex;align-items:flex-end;height:36px;margin:4px 0;overflow:hidden;gap:0}
.mk{display:inline-flex;align-items:flex-end;justify-content:center;width:14px;height:32px;background:#c8c8c8;border-radius:0 0 3px 3px;border:1px solid #888;cursor:pointer;position:relative;flex-shrink:0}
.mk.blk{height:20px;background:#1a1a1a;border-color:#444;z-index:2;margin:0 -4px;width:10px}
.mk.pressed{background:var(--cyan)!important;border-color:var(--cyan)!important}
.mk .kl{position:absolute;bottom:1px;font-size:6px;color:#666;left:50%;transform:translateX(-50%)}
.slen-grid{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.slen-btn{padding:3px 6px;border:1px solid var(--border);border-radius:3px;background:var(--panel2);color:var(--text2);cursor:pointer;font-size:10px;font-family:inherit;transition:all .1s;user-select:none}
.slen-btn:hover{border-color:var(--text3)}
.slen-btn.active{border-color:var(--cyan);background:#001824;color:var(--cyan)}
.pending-badge{display:inline-flex;gap:3px;flex-wrap:wrap;background:#001824;border:1px solid var(--cyan);border-radius:4px;padding:2px 6px;font-size:11px;color:var(--cyan)}
.knob-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;user-select:none;cursor:ns-resize}
.knob-wrap label{font-size:8px;color:var(--text2);text-align:center;max-width:38px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.knob-wrap .kval{font-size:8px;color:var(--text);text-align:center}
.knob{width:34px;height:34px;border-radius:50%;background:conic-gradient(var(--cyan) var(--ka,0deg),#0d1018 var(--ka,0deg));border:2px solid var(--border);position:relative}
.knob.orange{background:conic-gradient(var(--orange) var(--ka,0deg),#0d1018 var(--ka,0deg))}
.param-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.param-row label{width:110px;text-align:right;color:var(--text2);font-size:11px;flex-shrink:0}
.param-row label.w80{width:80px}
.param-row label.w60{width:60px}
.param-row input[type=range]{flex:1;max-width:180px;accent-color:var(--cyan);cursor:ew-resize}
.param-row .val{width:40px;color:var(--text);font-size:11px;text-align:right}
.param-row select,.param-row input[type=number]{flex:1;max-width:180px;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:11px;border-radius:3px;padding:2px 4px}
.param-row select:focus,.param-row input:focus{border-color:var(--cyan);outline:none}
.section{background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:8px}
.section h4{font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:var(--cyan);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
.section.orange h4{color:var(--orange)}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.osc-col{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px}
.osc-col h4{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--cyan);margin-bottom:6px;letter-spacing:1px}
.env-col{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px}
.env-col h4{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--orange);margin-bottom:6px;letter-spacing:1px}
.wave-btns{display:flex;gap:2px;margin-bottom:5px}
.wave-btn{width:28px;height:22px;border:1px solid var(--border);border-radius:3px;background:var(--panel);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);transition:all .1s}
.wave-btn:hover,.wave-btn.active{border-color:var(--cyan);color:var(--cyan);background:#001824}
.env-canvas,.filter-canvas{display:block;border-radius:3px;background:var(--bg);border:1px solid var(--border)}
.mod-table{width:100%;border-collapse:collapse;font-size:10px}
.mod-table th{color:var(--text2);text-align:left;padding:3px 4px;border-bottom:1px solid var(--border);font-size:9px}
.mod-table td{padding:2px 3px;border-bottom:1px solid #0d0f18}
.mod-table tr:hover td{background:var(--bg)}
.mod-table select{background:var(--bg);border:1px solid var(--border);color:var(--text);font-size:9px;font-family:inherit;border-radius:2px;padding:1px 2px;width:100%}
.pat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:10px}
.pat-card{border:1px solid var(--border);border-radius:6px;background:var(--panel2);padding:6px;cursor:pointer;transition:all .1s;position:relative;overflow:hidden}
.pat-card:hover{border-color:var(--text3)}
.pat-card.active{border-color:var(--cyan);background:#001824;box-shadow:0 0 8px #00e5ff22}
.pat-card .pname{font-size:10px;color:var(--text2);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pat-card .plen{font-size:9px;color:var(--text3)}
.pat-mini{display:block;width:100%;height:28px;border-radius:2px}
.midi-kb-wrap{overflow-x:auto;padding-bottom:4px;margin:6px 0}
.midi-kb{display:inline-block;position:relative;user-select:none}
.midi-key{position:absolute;bottom:0;border:1px solid #444;cursor:pointer;border-radius:0 0 3px 3px;transition:background .04s}
.midi-key.white{background:#c8c8c8;z-index:1}
.midi-key.black{background:#1a1a1a;z-index:2}
.midi-key.white:hover,.midi-key.white.on{background:var(--cyan)}
.midi-key.black:hover,.midi-key.black.on{background:#005578}
.midi-monitor{font-size:10px;font-family:inherit;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:6px;max-height:140px;overflow-y:auto}
.bank-grid{display:flex;flex-wrap:wrap;gap:3px;max-height:160px;overflow-y:auto;margin-top:4px}
.bank-cell{width:72px;height:28px;border:1px solid var(--border);border-radius:3px;background:var(--panel2);display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer;overflow:hidden;padding:0 2px;text-align:center;transition:all .1s;white-space:nowrap;text-overflow:ellipsis}
.bank-cell:hover{border-color:var(--text3)}
.bank-cell.active{border-color:var(--cyan);background:#001824;color:var(--cyan)}
.bank-cell.loaded{background:#001020;border-color:#003344}
.perf-pads{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:10px}
.perf-pad{height:52px;border:1px solid var(--border);border-radius:6px;background:var(--panel2);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:11px;user-select:none;transition:all .08s;position:relative;overflow:hidden}
.perf-pad:active,.perf-pad.active{border-color:var(--cyan);box-shadow:0 0 8px var(--cyan);background:#001824}
.perf-pad .vel-bar{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--cyan)}
.xy-pad{width:120px;height:120px;background:var(--bg);border:1px solid var(--border);border-radius:6px;position:relative;cursor:crosshair;flex-shrink:0;touch-action:none}
.xy-thumb{position:absolute;width:12px;height:12px;border-radius:50%;background:var(--cyan);box-shadow:var(--glow);transform:translate(-50%,-50%);pointer-events:none}
.pitch-strip{width:22px;height:110px;border:1px solid var(--border);border-radius:4px;background:var(--bg);position:relative;cursor:ns-resize;flex-shrink:0;touch-action:none}
.pitch-thumb{position:absolute;left:2px;right:2px;height:10px;background:var(--cyan);border-radius:3px;box-shadow:var(--glow)}
.chain-slot{display:inline-flex;align-items:center;justify-content:center;width:32px;height:22px;border:1px solid var(--border);border-radius:3px;background:var(--panel2);font-size:10px;cursor:pointer;margin:2px;transition:all .1s}
.chain-slot.filled{background:#001824;border-color:var(--cyan);color:var(--cyan)}
.ctx-menu{position:fixed;background:#1a1d2a;border:1px solid var(--border);border-radius:5px;padding:4px 0;z-index:500;min-width:140px;box-shadow:0 4px 24px #000a}
.ctx-menu-item{padding:6px 14px;cursor:pointer;font-size:11px;transition:background .08s;color:var(--text)}
.ctx-menu-item:hover{background:#0d1a24;color:var(--cyan)}
.ctx-menu-sep{height:1px;background:var(--border);margin:3px 0}
.overlay{display:none;position:fixed;inset:0;background:#000c;z-index:1000;align-items:center;justify-content:center}
.overlay.show{display:flex}
.overlay-box{background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:20px;max-width:520px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 4px 24px #000a}
.overlay-box h3{font-family:'Orbitron',sans-serif;color:var(--cyan);margin-bottom:12px;font-size:13px;letter-spacing:1px}
.overlay-box table{width:100%;border-collapse:collapse;font-size:11px}
.overlay-box td{padding:3px 8px;border-bottom:1px solid var(--border)}
.overlay-box td:first-child{color:var(--cyan);font-weight:700;white-space:nowrap}
kbd{background:var(--panel);border:1px solid var(--border);border-radius:3px;padding:1px 4px;font-size:10px;color:var(--text2)}
.nrpn-row{display:flex;align-items:center;gap:6px;margin-bottom:2px;padding:2px 4px;border-radius:3px}
.nrpn-row:hover{background:var(--bg)}
.nrpn-row .nr{width:32px;color:var(--text3);font-size:9px;flex-shrink:0}
.nrpn-row .nn{flex:1;color:var(--text);font-size:10px}
.nrpn-row input[type=range]{width:80px;accent-color:var(--cyan);cursor:ew-resize}
.nrpn-row .nv{width:32px;color:var(--text2);font-size:10px;text-align:right}
.ptabs{display:flex;gap:3px;margin-bottom:8px;flex-wrap:wrap}
.arp-viz{display:flex;gap:3px;flex-wrap:wrap;margin-top:4px}
.arp-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .08s,box-shadow .08s}
.arp-dot.active{background:var(--cyan);box-shadow:0 0 5px var(--cyan)}
.syx-log{background:var(--bg);padding:6px;border-radius:4px;font-size:10px;max-height:90px;overflow:auto;color:var(--cyan);border:1px solid var(--border);white-space:pre-wrap;word-break:break-all}
.song-entry{display:inline-flex;align-items:center;gap:3px;background:#001020;border:1px solid var(--border);border-radius:4px;padding:2px 5px;font-size:10px;margin:2px}
.song-entry.current{border-color:var(--cyan);box-shadow:0 0 5px var(--cyan)}
.trk-grid{display:flex;gap:1px;align-items:flex-end;height:50px;margin-top:6px;border:1px solid var(--border);border-radius:3px;padding:2px;background:var(--bg)}
.trk-bar-col{flex:1;background:var(--panel2);border-radius:2px;cursor:ns-resize;min-width:6px;transition:height .1s}
.knob-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px}
@media(max-width:767px){.grid3,.grid2{grid-template-columns:1fr}.pat-grid{grid-template-columns:repeat(2,1fr)}.step{width:36px;height:36px}.xy-pad{width:100px;height:100px}#panel{padding:8px}}

</style>
</head>
<body>
<div id="app"></div>
<div id="ctx-container"></div>
<script type="module">

import { createElement, applyDiff } from 'https://esm.sh/webjsx@0.0.73';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(createElement);

// ── CONSTANTS ──────────────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const isBlack = p => [1,3,6,8,10].includes(p%12);
const noteColor = p => `hsl(${[0,30,60,90,120,180,240,270,300,210,150,330][p%12]},60%,45%)`;
const velColor = v => v<43?'#00e5ff':v<86?'#00e676':v<107?'#ffd600':'#ff6b00';
const stepFracLabel = v => ({0.03125:'1/32',0.0625:'1/16',0.125:'1/8',0.25:'1/4',0.5:'1/2',1:'1',1.5:'3/2',2:'2',3:'3',4:'4'}[v]||String(v));
const VEL_H = 38;
const STEP_LENS = [0.03125, 0.0625, 0.125, 0.25, 0.5, 1, 1.5, 2, 3, 4];
const LEN_MAP = {'1':0.0625,'2':0.125,'3':0.25,'4':0.5,'5':1,'6':1.5,'7':2,'8':3,'9':4};

const FILTER_TYPES = ['bypass','mg 4-pole LP','ob 2-pole LP','ob 2-pole BP','ob 2-pole HP','rp 4-pole LP','tb 3-pole LP','jp 4-pole LP','8-pole LP','op 4-pole HP','8ve dual BP','6-pole BP','phase warp','comb 1','comb 2','comb 3','comb 4','vocal formant 1','vocal formant 2','vocal formant 3','bandlimit'];

const TEMPO_SYNC_RATES = ['16','12','10⅔','8','6','5⅓','4','3','2⅔','2','1½','1⅓','1','3/4','2/3','1/2','3/8','1/3','1/4','3/16','1/6','1/8','3/32','1/12','1/16'];
const ENV_SLOPES = ['linear','exp+','exp-'];

const PORTAMENTO_TYPES = ['fixed','scaled','gliss fixed','gliss scaled'];

const PATCH_CATEGORIES = ['recent','faves','bass','lead','pad','string','brass','key','comp','drum','sfx'];

// Full mod source list (from sysex doc: 115 sources)

const MIDI_MSG_NAMES = {0x80:'Note Off',0x90:'Note On',0xA0:'Poly AT',0xB0:'CC',0xC0:'PrgCh',0xD0:'Ch AT',0xE0:'PitchBd',0xF0:'SysEx'};
const CC_NAMES = {0:'Bank MSB',1:'Mod',2:'BrCtrl',6:'NRPN MSB',7:'Volume',10:'Pan',11:'Expr',38:'NRPN LSB',64:'Sustain',65:'Porta',98:'NRPN LSB',99:'NRPN MSB',120:'All Snd Off',123:'All Notes Off'};
function parseMidiMsg(d) {
  const st = d[0]&0xF0, ch = (d[0]&0x0F)+1;
  const tn = MIDI_MSG_NAMES[st]||'?';
  if (st===0x90&&d[2]>0) return `Note On  ch${ch} ${NOTE_NAMES[d[1]%12]}${Math.floor(d[1]/12)-1} v${d[2]}`;
  if (st===0x80||(st===0x90&&d[2]===0)) return `Note Off ch${ch} ${NOTE_NAMES[d[1]%12]}${Math.floor(d[1]/12)-1}`;
  if (st===0xB0) return `CC  ch${ch} ${CC_NAMES[d[1]]||'#'+d[1]}=${d[2]}`;
  if (st===0xE0) return `PitchBd  ch${ch} ${((d[2]<<7)|d[1])-8192}`;
  if (st===0xF0) return `SysEx [${d.length}b]`;
  return `${tn} ch${ch} ${d[1]||''} ${d[2]||''}`;
}

function logMidi(type, bytes) {

function handleMidiMsg(e) {
  if (!e.data) return;
  const d = e.data;
  if (d[0]===0xF0) { handleSysEx(d); logMidi('sx', d); return; }
  const st = d[0]&0xF0;
  if (S.midiThru && S.midi.output) try { S.midi.output.send(d); } catch(_) {}
  if (st===0x90 && d[2]>0) {
    logMidi('nn', d);
    if (S.recording && S.playing) {
      const s = step(S.playStep % pat().len);
      if (!s.notes.find(n=>n.pitch===d[1])) s.notes.push({pitch:d[1], vel:d[2], len:S.stepLen});

    logMidi('cc', d);
    const cc = d[1], val = d[2];
    if (S.midiLearnTarget !== null) { S.ccMap[cc] = S.midiLearnTarget; S.midiLearnTarget = null; render(); return; }

    if (cc === 1) { S.modWheelVal = val; }
  } else { logMidi('?', d); }
  render();
}

// ── SYSEX (7-of-8 format per Alesis spec) ─────────────────────────
function pack7of8(bytes) {
  const out = [];
  for (let i = 0; i < bytes.length; i += 7) {
    const chunk = bytes.slice(i, i + 7);
    let msb = 0;
    chunk.forEach((b, j) => { if (b & 0x80) msb |= (1 << j); });
    out.push(msb & 0x7F);
    chunk.forEach(b => out.push(b & 0x7F));
  }
  return out;
}
function unpack7of8(data) {
  const out = [];
  for (let i = 0; i < data.length; i += 8) {
    const msb = data[i];
    for (let j = 1; j <= 7 && (i+j) < data.length; j++) {
      out.push((data[i+j] & 0x7F) | (((msb >> (j-1)) & 1) << 7));
    }
  }
  return out;
}

function handleSysEx(data) {
  const hex = Array.from(data).map(b => b.toString(16).padStart(2,'0')).join(' ');
  S.sysex.lastRx = data;
  // Alesis Micron SysEx: F0 00 00 0E 22 41 bank mode slot [header] [data] F7
  if (data[1]===0x00 && data[2]===0x00 && data[3]===0x0E && data[4]===0x22) {
    const raw = Array.from(data).slice(7, data.length - 1);
    const unpacked = unpack7of8(raw);
    // Header: bytes 0-14 = name (15 chars), etc per sysex doc offset 63
    // The 7of8 unpacked data starts at header, actual patch data at offset 63 within unpacked
    // Extract name from offset 63 (sysex doc: idx 63 = name, 15 chars)
    const hdrSize = 56; // header is 56 bytes per doc (indices 0-62)
    const nameBytes = unpacked.slice(hdrSize, hdrSize + 15);
    const name = nameBytes.map(b => b>=32&&b<127 ? String.fromCharCode(b) : ' ').join('').trim() || 'Untitled';
    const patchData = unpacked.slice(hdrSize);
    const slot = S.sysex.presetNum;
    if (slot >= 0 && slot < 128) S.sysex.bank[slot] = { name, data: patchData };
    // Store patch params
    patchData.forEach((v, i) => { S.patch[i] = v; });
    S.sysex.rxLog = `Rx: "${name}" (slot ${slot}, ${patchData.length} bytes)\n` + hex.slice(0, 300);
  } else {
    S.sysex.rxLog = `Rx: ${hex.slice(0, 400)}`;
  }
  render();
}

function buildSysExMsg(bank, slot, patchBytes) {
  // F0 00 00 0E 22 41 0x 00 yy [header+patch packed 7of8] F7
  const hdr = [
    0x00, 0x00, 0x0E, // Alesis mfr
    0x22,            // Ion/Micron
    0x41,            // request patch opcode
    bank & 0x0F,    // bank
    0x00,            // single patch
    slot & 0x7F,    // patch number
  ];
  const payload = new Array(56).fill(0).concat(patchBytes);
  const packed = pack7of8(payload);
  return new Uint8Array([0xF0, ...hdr, ...packed, 0xF7]);
}

function requestPatch(n) {
  n = n ?? S.sysex.presetNum;
  S.sysex.presetNum = n;
  // F0 00 00 0E 22 41 04 00 yy F7 (bank 4 = edit buffer)
  midiOut([0xF0, 0x00, 0x00, 0x0E, 0x22, 0x41, 0x04, 0x00, n & 0x7F, 0xF7]);
}
function sendPatchDump() {
  const maxIdx = Math.max(0, ...Object.keys(S.patch).map(Number));
  const bytes = Array.from({length: maxIdx+1}, (_, i) => S.patch[i] ?? 0);
  const msg = buildSysExMsg(4, S.sysex.presetNum, bytes);
  S.sysex.lastTx = msg;
  midiOut(msg);
}

// ── MIDI EXPORT ──────────────────────────────────────────────────
function exportMidi() {
  const TICKS = 480;
  const chunks = [];
  // Header chunk
  const trackCount = S.patterns.filter(p => p.steps.some(s => s.notes.length)).length || 1;
  chunks.push(new Uint8Array([0x4D,0x54,0x68,0x64, 0,0,0,6, 0, trackCount>1?1:0, (trackCount>>8)&255, trackCount&255, (TICKS>>8)&255, TICKS&255]));

  S.patterns.forEach(p => {
    if (!p.steps.some(s => s.notes.length)) return;
    const events = [];
    const tempoUs = Math.round(60000000 / S.bpm);
    events.push({tick:0, data:[0xFF,0x51,0x03,(tempoUs>>16)&255,(tempoUs>>8)&255,tempoUs&255]});
    const tname = Array.from(new TextEncoder().encode(p.name));
    events.push({tick:0, data:[0xFF,0x03,tname.length,...tname]});
    p.steps.slice(0, p.len).forEach((st, i) => {
      const tick = i * TICKS * 0.25; // 1/16th = TICKS/4 at 4/4
      st.notes.forEach(n => {
        events.push({tick, data:[0x90|(S.midi.channel-1), n.pitch, n.vel||100]});
        events.push({tick: tick + Math.round((n.len||0.0625)*16*TICKS*0.25*0.9), data:[0x80|(S.midi.channel-1), n.pitch, 0]});
      });
    });
    events.push({tick: p.len * TICKS * 0.25, data:[0xFF,0x2F,0]});
    events.sort((a,b) => a.tick - b.tick);
    const trackBytes = [];
    let lastTick = 0;
    events.forEach(ev => {
      const delta = Math.round(ev.tick - lastTick);
      lastTick = ev.tick;
      // Write variable-length delta
      const vlq = [];
      let v = delta;
      vlq.unshift(v & 0x7F);
      v >>= 7;
      while (v > 0) { vlq.unshift((v & 0x7F) | 0x80); v >>= 7; }
      vlq.forEach(b => trackBytes.push(b));
      ev.data.forEach(b => trackBytes.push(b));
    });
    const len = trackBytes.length;
    chunks.push(new Uint8Array([0x4D,0x54,0x72,0x6B, (len>>24)&255,(len>>16)&255,(len>>8)&255,len&255, ...trackBytes]));
  });

  const total = chunks.reduce((s,c) => s + c.length, 0);
  const buf = new Uint8Array(total);
  let offset = 0;
  chunks.forEach(c => { buf.set(c, offset); offset += c.length; });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([buf], {type:'audio/midi'}));
  a.download = 'micron_patterns.mid'; a.click();
}

    Filter: [[126,2,200,900],[128,2,200,900],[130,1,0,80],[131,1,0,80],[132,1,-50,50],[133,1,-50,50]],
    ENV: [[168,1,0,100],[169,1,0,100],[170,1,0,60],[171,1,10,120],[172,1,10,120],[174,1,30,90]],
    LFO: [[203,2,50,400],[205,2,50,400],[207,1,0,60],[208,1,0,60]],
  };
  const params = ranges[section] || [];
  pushUndo();
  params.forEach(([idx, bytes, mn, mx]) => {
    const val = mn + Math.floor(Math.random() * (mx - mn + 1));
    S.patch[idx] = val;
    sendNRPN(idx, val + 64);
  });
  S.unsaved = true;
  render();
}
function storeAB(slot) {
  S.abPatch[slot] = JSON.parse(JSON.stringify(S.patch));
}
function recallAB(slot) {
  if (!S.abPatch[slot]) return;
  pushUndo();
  S.patch = JSON.parse(JSON.stringify(S.abPatch[slot]));
  Object.entries(S.patch).forEach(([k,v]) => sendNRPN(parseInt(k), v+64));
  render();
}


// ── CANVAS PIANO ROLL ─────────────────────────────────────────────
let RC, RX;

function rollH() { return S.rollH || 220; }
function noteGridH() { return RC ? rollH() - VEL_H - RULER_H : 180; }

function initCanvas() {
  RC = document.getElementById('roll');
  if (!RC) return;
  RX = RC.getContext('2d');
  const wrap = document.getElementById('roll-wrap');
  wrap.style.height = rollH() + 'px';
  RC.width = wrap.clientWidth || 900;
  RC.height = rollH();
  RC.removeEventListener('mousedown', onRollMouse);
  RC.removeEventListener('contextmenu', onRollCtx);
  RC.removeEventListener('wheel', onRollWheel);
  RC.addEventListener('mousedown', onRollMouse);
  RC.addEventListener('contextmenu', onRollCtx);
  RC.addEventListener('wheel', onRollWheel, {passive:false});
  RC.addEventListener('touchstart', onRollTS, {passive:false});
  RC.addEventListener('touchmove', onRollTM, {passive:false});

  // Resizer
  const resizer = document.getElementById('roll-resizer');
  if (resizer) {
    resizer.onmousedown = e => {
      e.preventDefault();
      const startY = e.clientY, startH = rollH();
      const mm = ev => { S.rollH = Math.max(80, Math.min(500, startH + ev.clientY - startY)); drawRoll(); const wrap=document.getElementById('roll-wrap'); if(wrap) wrap.style.height=S.rollH+'px'; if(RC){RC.height=S.rollH;} };
      const mu = () => { document.removeEventListener('mousemove',mm); document.removeEventListener('mouseup',mu); };
      document.addEventListener('mousemove', mm);
      document.addEventListener('mouseup', mu);
    };
  }
  drawRoll();
}

const PIANO_W = 52;

function drawRoll() {
  if (!RX || !RC) return;
  const W = RC.width, H = RC.height;
  const GH = noteGridH(), RUH = RULER_H;
  const pw = PIANO_W, zh = S.zoomY, zx = S.zoomX;
  const rows = Math.ceil(GH / zh) + 2;

  RX.fillStyle = '#08090d'; RX.fillRect(0, 0, W, H);

  // Ruler
  RX.fillStyle = '#0e1018'; RX.fillRect(pw, 0, W-pw, RUH);
  RX.strokeStyle = '#1c1f2e'; RX.lineWidth = 1;
  RX.beginPath(); RX.moveTo(pw, RUH); RX.lineTo(W, RUH); RX.stroke();
  for (let s = 0; s < pat().len; s++) {
    const x = pw + s * zx - S.rollViewX;
    if (x > W) break; if (x + zx < pw) continue;
    if (s % 16 === 0) {
      RX.fillStyle = '#1c1f2e'; RX.fillRect(x, 0, 1, RUH);
      RX.fillStyle = '#00e5ff'; RX.font = 'bold 9px "JetBrains Mono"';
      RX.fillText('B' + (Math.floor(s/16)+1), x+3, RUH-4);
    } else if (s % 4 === 0) {
      RX.fillStyle = '#1c1f2e'; RX.fillRect(x, RUH/2, 1, RUH/2);
      RX.fillStyle = '#3a3f54'; RX.font = '8px "JetBrains Mono"';
      RX.fillText((s%16/4+1), x+2, RUH-4);
    } else {
      RX.fillStyle = '#1c1f2e'; RX.fillRect(x, RUH*0.75, 1, RUH*0.25);
    }
  }

  // Note grid
  for (let r = 0; r < rows; r++) {
    const pitch = S.pitchOffset + r;
    const y = RUH + GH - (r+1)*zh;
    const blk = isBlack(pitch);
    RX.fillStyle = blk ? '#0a0b10' : (pitch % 12 === 0 ? '#131520' : '#0e1018');
    RX.fillRect(pw, y, W-pw, zh);
    // C lines
    if (pitch % 12 === 0) {
      RX.strokeStyle = '#1e2135'; RX.lineWidth = 0.5;
      RX.beginPath(); RX.moveTo(pw, y); RX.lineTo(W, y); RX.stroke();
    }
    // Piano key
    RX.fillStyle = blk ? '#1a1a1a' : (S.pressedKeys.has(pitch) ? '#00e5ff' : '#c8c8c8');
    RX.fillRect(0, y, blk ? 32 : pw-2, zh-1);
    if (!blk && S.pressedKeys.has(pitch)) RX.fillStyle = '#00e5ff';
    if (!blk && zh >= 10) {
      RX.fillStyle = S.pressedKeys.has(pitch) ? '#000' : '#666';
      RX.font = `${Math.min(zh-2,9)}px "JetBrains Mono"`;
      RX.fillText(NOTE_NAMES[pitch%12] + (Math.floor(pitch/12)-1), 2, y+zh-3);
    }
  }
  // Vertical piano border
  RX.fillStyle = '#1c1f2e'; RX.fillRect(pw-1, RUH, 1, GH);

  // Beat/step grid lines
  for (let s = 0; s < pat().len; s++) {
    const x = pw + s*zx - S.rollViewX;
    if (x > W) break; if (x+zx < pw) continue;
    if (s % 16 === 0) { RX.strokeStyle = '#2a2d3e'; RX.lineWidth = 1.2; }
    else if (s % 4 === 0) { RX.strokeStyle = '#1c1f2e'; RX.lineWidth = 0.8; }
    else { RX.strokeStyle = '#12141c'; RX.lineWidth = 0.4; }
    RX.beginPath(); RX.moveTo(x, RUH); RX.lineTo(x, RUH+GH); RX.stroke();
  }

  // Cursor highlight
  const cx = pw + S.cursor*zx - S.rollViewX;
  RX.fillStyle = '#00e5ff0a'; RX.fillRect(cx, RUH, zx, GH);
  RX.strokeStyle = '#00e5ff33'; RX.lineWidth = 1;
  RX.strokeRect(cx, RUH, zx, GH);

  // Notes
  for (let s = 0; s < pat().len; s++) {
    const st = pat().steps[s]; if (!st) continue;
    st.notes.forEach(n => {
      const r = n.pitch - S.pitchOffset;
      if (r < 0 || r >= rows) return;
      const x = pw + s*zx - S.rollViewX + 1;
      const y = RUH + GH - (r+1)*zh + 1;
      const nw = Math.max((n.len||S.stepLen)*16*zx - 2, 3);
      RX.fillStyle = noteColor(n.pitch);
      RX.beginPath();
      if (RX.roundRect) RX.roundRect(x, y, nw, zh-2, 2);
      else RX.rect(x, y, nw, zh-2);
      RX.fill();
      if (nw > 14 && zh > 8) {
        RX.fillStyle = '#ffffffcc'; RX.font = `${Math.min(zh-3,9)}px "JetBrains Mono"`;
        RX.fillText(NOTE_NAMES[n.pitch%12], x+2, y+zh-4);
      }
    });
  }

  // Pending notes preview
  S.pending.forEach(n => {
    const r = n.pitch - S.pitchOffset;
    if (r < 0 || r >= rows) return;
    RX.fillStyle = '#ffffff22';
    RX.fillRect(pw+S.cursor*zx-S.rollViewX+1, RUH+GH-(r+1)*zh+1, zx-2, zh-2);
  });

  // Playhead
  if (S.playing) {
    const ps = S.playStep % pat().len;
    const px = pw + ps*zx - S.rollViewX;
    RX.strokeStyle = '#ffd600'; RX.lineWidth = 2;
    RX.beginPath(); RX.moveTo(px, RUH); RX.lineTo(px, RUH+GH); RX.stroke();
    // Auto-scroll
    if (px > W - 60) { S.rollViewX += W / 2; }
    else if (px < pw + 4 && S.rollViewX > 0) { S.rollViewX = Math.max(0, S.rollViewX - W/2); }
  }

  // Velocity lane
  const VY = RUH + GH;
  RX.fillStyle = '#0a0b10'; RX.fillRect(0, VY, W, VEL_H);
  RX.strokeStyle = '#1c1f2e'; RX.lineWidth = 1;
  RX.beginPath(); RX.moveTo(pw, VY); RX.lineTo(W, VY); RX.stroke();
  RX.fillStyle = '#3a3f54'; RX.font = '8px "JetBrains Mono"';
  RX.fillText('VEL', 2, VY+12);
  for (let s = 0; s < pat().len; s++) {
    const st = pat().steps[s]; if (!st || !st.notes.length) continue;
    const x = pw + s*zx - S.rollViewX;
    if (x > W || x+zx < pw) continue;
    const mv = Math.max(...st.notes.map(n => n.vel||100));
    const bh = Math.max(2, (mv/127)*(VEL_H-5));
    RX.fillStyle = velColor(mv);
    RX.fillRect(x+1, VY+VEL_H-bh-1, Math.max(2, zx-3), bh);
  }
}

function rollPitchAt(y) { return S.pitchOffset + Math.floor((noteGridH()-(y-RULER_H))/S.zoomY); }
function rollStepAt(x) { return Math.floor((x - PIANO_W + S.rollViewX) / S.zoomX); }
function inVelLane(y) { return y > RULER_H + noteGridH(); }

function onRollCtx(e) {
  e.preventDefault();
  const r = RC.getBoundingClientRect();
  const s = rollStepAt(e.clientX-r.left), p = rollPitchAt(e.clientY-r.top);
  showCtxMenu(e.clientX, e.clientY, [
    {label:'Delete note', fn:()=>{ step(s).notes=step(s).notes.filter(n=>n.pitch!==p); drawRoll(); render(); }},
    {label:'Set velocity…', fn:()=>{ const v=prompt('Velocity (1-127):','100'); if(v){const n=step(s).notes.find(n=>n.pitch===p);if(n){n.vel=Math.max(1,Math.min(127,parseInt(v)||100));drawRoll();}}}},
    {label:'Set probability…', fn:()=>{ const v=prompt('Probability % (0-100):','100'); if(v!==null){step(s).prob=Math.max(0,Math.min(100,parseInt(v)||100));render();}}},
    {label:'Clear step', fn:()=>{ step(s).notes=[]; drawRoll(); render(); }},
    {sep:true},
    {label:'Fill bar', fn:()=>{ const bar=Math.floor(s/16)*16; for(let i=bar;i<bar+16;i++){if(!pat().steps[i]) continue; pat().steps[i].notes=[{pitch:p,vel:100,len:S.stepLen}];} drawRoll(); render(); }},
  ]);
}

let rollDrag = null;
function onRollMouse(e) {
  if (e.button === 2) return;
  e.preventDefault();
  const r = RC.getBoundingClientRect();
  const rx = e.clientX - r.left, ry = e.clientY - r.top;
  const s = rollStepAt(rx), p = rollPitchAt(ry);
  if (s < 0 || s >= pat().len) return;
  if (inVelLane(ry)) {
    rollDrag = {type:'vel', s};
    const vf = Math.max(0, Math.min(1, (RULER_H+noteGridH()+VEL_H-ry-1)/(VEL_H-4)));
    step(s).notes.forEach(n => { n.vel = Math.max(1, Math.min(127, Math.round(vf*127))); });
    drawRoll(); return;
  }
  const st = step(s);
  if (e.shiftKey) { st.notes = st.notes.filter(n=>n.pitch!==p); drawRoll(); render(); return; }
  if (st.notes.find(n=>n.pitch===p)) { st.notes = st.notes.filter(n=>n.pitch!==p); }
  else { pushUndo(); st.notes.push({pitch:p, vel:100, len:S.stepLen}); previewNote(p); S.unsaved=true; }
  rollDrag = {type:'draw'};
  drawRoll(); render();
}
document.addEventListener('mousemove', e => {
  if (!rollDrag || !RC) return;
  if (rollDrag.type === 'vel') {
    const r = RC.getBoundingClientRect(), ry = e.clientY - r.top;
    const vf = Math.max(0, Math.min(1, (RULER_H+noteGridH()+VEL_H-ry-1)/(VEL_H-4)));
    step(rollDrag.s).notes.forEach(n => { n.vel = Math.max(1, Math.min(127, Math.round(vf*127))); });
    drawRoll();
  }
});
document.addEventListener('mouseup', () => { rollDrag = null; });

let tT0=0, tP0=0, tS0=-1, pinchD0=0;
function onRollTS(e) {
  e.preventDefault();
  if (e.touches.length===1) {
    const r = RC.getBoundingClientRect();
    tS0 = rollStepAt(e.touches[0].clientX-r.left);
    tP0 = rollPitchAt(e.touches[0].clientY-r.top);
    tT0 = Date.now();
  } else if (e.touches.length===2) {
    pinchD0 = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
  }
}
function onRollTM(e) {
  e.preventDefault();
  if (e.touches.length===2) {
    const d = Math.hypot(e.touches[0].clientX-e.touches[1].clientX, e.touches[0].clientY-e.touches[1].clientY);
    if (pinchD0) S.zoomX = Math.max(8, Math.min(120, S.zoomX * d/pinchD0));
    pinchD0 = d; drawRoll();
  }
}
document.addEventListener('touchend', () => {
  if (tS0 >= 0 && tS0 < pat().len) {
    const st = step(tS0);
    if (Date.now()-tT0 > 500) st.notes = st.notes.filter(n=>n.pitch!==tP0);
    else if (!st.notes.find(n=>n.pitch===tP0)) st.notes.push({pitch:tP0, vel:100, len:S.stepLen});
    drawRoll(); render();
  }
  tS0 = -1;
});

function onRollWheel(e) {
  e.preventDefault();
  if (e.ctrlKey) S.zoomX = Math.max(8, Math.min(120, S.zoomX - e.deltaY*0.1));
  else if (e.shiftKey) S.zoomY = Math.max(6, Math.min(40, S.zoomY - e.deltaY*0.1));
  else if (e.altKey) S.pitchOffset = Math.max(0, Math.min(108, S.pitchOffset + (e.deltaY>0?-1:1)));
  else S.rollViewX = Math.max(0, S.rollViewX + (e.deltaY>0 ? S.zoomX : -S.zoomX));
  drawRoll();
}

function drawMiniRoll(canvas, pattern) {
  if (!canvas || !pattern) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#08090d'; ctx.fillRect(0,0,W,H);
  const len = pattern.len || 16;
  const sw = W / len;
  const pitches = pattern.steps.slice(0,len).flatMap(st=>st.notes.map(n=>n.pitch));
  if (!pitches.length) return;
  const mn = Math.min(...pitches), mx = Math.max(...pitches), rng = Math.max(mx-mn,4);
  pattern.steps.slice(0,len).forEach((st,i) => st.notes.forEach(n => {
    ctx.fillStyle = noteColor(n.pitch);
    ctx.fillRect(i*sw, (H-2)-((n.pitch-mn)/rng)*(H-4), Math.max(1,(n.len||0.0625)*16*sw), 2);
  }));
}

// ── KEYBOARD INPUT ─────────────────────────────────────────────────
function keyPitch(key) {
  const base = BASE_KEYS[key] || BASE_KEYS[key.toLowerCase()];
  return base ? base + S.octaveShift*12 : null;
}

function pushUndo() {
  const snap = pat().steps.map(s => ({...s, notes:s.notes.map(n=>({...n}))}));
  S.undoStack.push(snap);
  if (S.undoStack.length > 30) S.undoStack.shift();
}
function doUndo() {
  if (!S.undoStack.length) return;
  pat().steps = S.undoStack.pop();
  drawRoll(); render();
}

function scaleFilter(note) {
  if (!S.scale) return note;
  const root = S.scaleRoot % 12;
  const oct = Math.floor(note/12);
  const pc = ((note%12 - root) % 12 + 12) % 12;
  if (S.scale.includes(pc)) return note;
  let best = S.scale[0], bestDist = 12;
  S.scale.forEach(s => { const d = Math.min(((s-pc)%12+12)%12, ((pc-s)%12+12)%12); if (d < bestDist){bestDist=d; best=s;} });
  return oct*12 + ((best+root)%12);
}

function onKeyDown(e) {
  if (e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA') return;
  if (e.ctrlKey||e.metaKey) {
    if (e.key===' ') { e.preventDefault(); togglePlay(); return; }
    if (e.key.toLowerCase()==='r') { e.preventDefault(); S.recording=!S.recording; render(); return; }
    if (e.key.toLowerCase()==='z') { e.preventDefault(); doUndo(); return; }
    if (e.key.toLowerCase()==='s') { e.preventDefault(); saveState(); render(); return; }
    return;
  }
  if (e.key==='Escape') { S.shortcutsVisible=false; render(); return; }
  if (e.key==='?'||e.key==='/') { e.preventDefault(); S.shortcutsVisible=!S.shortcutsVisible; render(); return; }
  if (e.key.toLowerCase()==='m') { S.metronome=!S.metronome; if(S.metronome&&!S.audioCtx) S.audioCtx=new AudioContext(); render(); return; }
  if (e.key.toLowerCase()==='t') { tapTempo(); render(); return; }
  if (e.key==='z') { S.octaveShift=Math.max(-4,S.octaveShift-1); render(); return; }
  if (e.key==='x') { S.octaveShift=Math.min(4,S.octaveShift+1); render(); return; }
  if (e.key===' ') { e.preventDefault(); commitStep(); return; }
  if (e.key==='Backspace') {
    e.preventDefault(); pushUndo();
    step(S.cursor).notes=[]; S.pending=[];
    clearTimeout(S.debounceTimer); S.debounceActive=false; S.debounceVal=0;
    S.unsaved=true; drawRoll(); render(); return;
  }
  if (e.key==='ArrowLeft')  { S.cursor=Math.max(0,S.cursor-1); drawRoll(); render(); return; }
  if (e.key==='ArrowRight') { S.cursor=Math.min(pat().len-1,S.cursor+1); drawRoll(); render(); return; }
  if (e.key==='ArrowUp')    { S.pitchOffset=Math.min(108,S.pitchOffset+1); drawRoll(); return; }
  if (e.key==='ArrowDown')  { S.pitchOffset=Math.max(0,S.pitchOffset-1); drawRoll(); return; }
  if (!e.shiftKey && LEN_MAP[e.key]) { S.stepLen=LEN_MAP[e.key]; render(); return; }

  let pitch = keyPitch(e.key);
  if (!pitch) return;
  pitch = scaleFilter(pitch);
  if (pitch < 0 || pitch > 127) return;
  e.preventDefault();
  if (S.pressedKeys.has(pitch)) return;
  S.pressedKeys.add(pitch);
  if (S.arpActive && !S.arpHeld.includes(pitch)) S.arpHeld.push(pitch);
  const chordNotes = S.chordMode && S.chordIntervals.length
    ? [pitch, ...S.chordIntervals.map(iv => scaleFilter(pitch+iv)).filter(p=>p>=0&&p<=127)]
    : [pitch];
  if (!S.debounceActive) S.pending = [];
  chordNotes.forEach(p => {
    if (!S.pending.find(n=>n.pitch===p)) {
      S.pending.push({pitch:p, vel:100, len:S.stepLen});
      previewNote(p);
    }
  });
  step(S.cursor).notes = S.pending.map(n=>({...n}));
  S.debounceActive = true; S.debounceStart = Date.now();
  clearTimeout(S.debounceTimer);
  S.debounceTimer = setTimeout(() => { S.debounceActive=false; S.debounceVal=0; S.pressedKeys.clear(); }, 2000);
  S.unsaved = true; drawRoll(); render();
}

function onKeyUp(e) {
  const p = keyPitch(e.key);
  if (p) { S.pressedKeys.delete(scaleFilter(p)); S.arpHeld=S.arpHeld.filter(n=>n!==scaleFilter(p)); }
}

function commitStep() {
  clearTimeout(S.debounceTimer);
  S.debounceActive = false; S.debounceVal = 0; S.pending = []; S.pressedKeys.clear();
  S.cursor = (S.cursor+1) % pat().len;
  S.unsaved = true; drawRoll(); render();
}

// Debounce ring animation
;(function rafDebounce() {
  requestAnimationFrame(rafDebounce);
  const ring = document.getElementById('dring');
  if (!ring) return;
  const pct = S.debounceActive ? Math.min(1, (Date.now()-S.debounceStart)/2000) : 0;
  ring.style.strokeDashoffset = String(63 * (1 - pct));
})();

// ── METRONOME ─────────────────────────────────────────────────────
function clickMetronome(beat) {
  if (!S.audioCtx || !S.metronome) return;
  const osc = S.audioCtx.createOscillator();
  const g = S.audioCtx.createGain();
  osc.connect(g); g.connect(S.audioCtx.destination);
  osc.frequency.value = beat===0 ? 1200 : 800;
  g.gain.setValueAtTime(beat===0 ? 0.3 : 0.15, S.audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, S.audioCtx.currentTime+0.05);
  osc.start(); osc.stop(S.audioCtx.currentTime+0.06);
}

function tapTempo() {
  const now = Date.now();
  S.tapTimes = S.tapTimes.filter(t => now-t < 3000);
  S.tapTimes.push(now);
  if (S.tapTimes.length >= 2) {
    const avg = S.tapTimes.slice(1).map((t,i)=>t-S.tapTimes[i]).reduce((a,b)=>a+b,0)/(S.tapTimes.length-1);
    S.bpm = Math.max(20, Math.min(300, Math.round(60000/avg)));
  }
}

// ── ARP ───────────────────────────────────────────────────────────
function tickArp() {
  if (!S.arpActive || !S.arpHeld.length) return;
  const notes = [];
  for (let o=0; o<S.arpOctaves; o++) S.arpHeld.forEach(n=>notes.push(n+o*12));
  let seq = notes.slice();
  if (S.arpMode==='down') seq.reverse();
  else if (S.arpMode==='updown') seq=[...seq,...seq.slice(1,-1).reverse()];
  else if (S.arpMode==='random') seq.sort(()=>Math.random()-.5);
  const pitch = seq[S.arpStep % seq.length];
  if (pitch >= 0 && pitch <= 127) {
    sendNoteOn(pitch, 90);
    setTimeout(() => sendNoteOff(pitch), 60);
  }
  S.arpVizStep = S.arpStep % seq.length;
  S.arpStep++;
}

// ── TRANSPORT ─────────────────────────────────────────────────────
function togglePlay() {
  if (S.playing) {
    S.playing = false;
    clearInterval(S.schedTimer); S.schedTimer = null;
    pat().steps.forEach(st=>st.notes.forEach(n=>sendNoteOff(n.pitch)));
    if (S.sendClock) midiOut([0xFC]);
    drawRoll(); render(); return;
  }
  if (!S.audioCtx) S.audioCtx = new AudioContext();
  S.playing = true; S.playStep = 0; S.barBeat = 0;
  S.playTime = S.audioCtx.currentTime;
  if (S.sendClock) midiOut([0xFA]);
  S.schedTimer = setInterval(scheduler, 20);
  render();
}

function scheduler() {
  if (!S.audioCtx || !S.playing) return;
  const stepDur = 60 / S.bpm / 4;
  while (S.playTime < S.audioCtx.currentTime + 0.10) {
    // Song mode
    let activePat = S.patterns[S.patIdx];
    if (S.songChain.length > 0 && S.playing) {
      const se = S.songChain[S.songPos];
      if (se) activePat = S.patterns[se.pat];
    }
    const idx = S.playStep % activePat.len;
    const swingOff = (S.swingAmt>0 && idx%2===1) ? stepDur*S.swingAmt/100 : 0;
    const tPlay = S.playTime + swingOff;
    const st = activePat.steps[idx];
    if (st) {
      const prob = st.prob !== undefined ? st.prob : 100;
      if (Math.random()*100 < prob) {
        st.notes.forEach(n => {
          const dur = (n.len||S.stepLen)*16*stepDur*0.9;
          midiOut([0x90|(S.midi.channel-1), n.pitch, n.vel||100], tPlay*1000);
          midiOut([0x80|(S.midi.channel-1), n.pitch, 0], (tPlay+dur)*1000);
        });
      }
    }
    if (S.arpActive) tickArp();
    if (S.metronome) clickMetronome(S.barBeat%16===0?0:1);
    if (S.sendClock) midiOut([0xF8]);
    S.barBeat++; S.playTime += stepDur; S.playStep++;
    // Song advance
    if (S.songChain.length > 0) {
      const se = S.songChain[S.songPos];
      if (se && S.playStep >= activePat.len * se.reps) {
        S.playStep = 0;
        S.songPos = (S.songPos+1) % S.songChain.length;
      }
    }
  }
  drawRoll();
}

function posDisplay() {
  const s = S.playStep % pat().len;
  return `${Math.floor(s/16)+1}.${Math.floor((s%16)/4)+1}.${(s%4)+1}`;
}

function humanize() {
  pushUndo();
  const amt = S.humanizeAmt || 20;
  pat().steps.forEach(st=>st.notes.forEach(n=>{
    n.vel = Math.max(1, Math.min(127, (n.vel||100) + Math.round((Math.random()-.5)*amt)));
  }));
  drawRoll(); render();
}
function quantize() {
  pushUndo();
  pat().steps.forEach(st=>st.notes.forEach(n=>{
    n.len = [0.03125,0.0625,0.125,0.25,0.5,1].reduce((b,q)=>Math.abs(q-n.len)<Math.abs(b-n.len)?q:b,0.0625);
  }));
  drawRoll(); render();
}

// ── GAMEPAD ──────────────────────────────────────────────────────
function pollGamepad() {
  requestAnimationFrame(pollGamepad);
  const gp = (navigator.getGamepads?navigator.getGamepads():[])[0]; if(!gp) return;
  const b = i => !!(gp.buttons[i]&&gp.buttons[i].pressed);
  const ax = i => gp.axes[i]||0;
  const p = i => b(i)&&!S.gpPrev[i];
  const dL=b(14)||ax(0)<-.5, dR=b(15)||ax(0)>.5, dU=b(12)||ax(1)<-.5, dD=b(13)||ax(1)>.5;
  if (p(0)) commitStep();
  if (p(1)) { step(S.cursor).notes=[]; S.pending=[]; drawRoll(); render(); }
  if (p(3)) { S.stepLen=STEP_LENS[Math.min(STEP_LENS.length-1,STEP_LENS.indexOf(S.stepLen)+1)]; render(); }
  if (p(2)) { S.stepLen=STEP_LENS[Math.max(0,STEP_LENS.indexOf(S.stepLen)-1)]; render(); }
  if (dL&&!S.gpPrev.dL) { S.cursor=Math.max(0,S.cursor-1); drawRoll(); render(); }
  if (dR&&!S.gpPrev.dR) { S.cursor=Math.min(pat().len-1,S.cursor+1); drawRoll(); render(); }
  if (dU&&!S.gpPrev.dU) { S.pitchOffset=Math.min(108,S.pitchOffset+1); drawRoll(); }
  if (dD&&!S.gpPrev.dD) { S.pitchOffset=Math.max(0,S.pitchOffset-1); drawRoll(); }
  if (p(9)) togglePlay();
  for(let i=0;i<20;i++) S.gpPrev[i]=b(i);
  S.gpPrev.dL=dL; S.gpPrev.dR=dR; S.gpPrev.dU=dU; S.gpPrev.dD=dD;
}

// ── CANVAS PATCH VISUALS ─────────────────────────────────────────
function drawEnvCurve(canvas, atk, dcy, sus, rel, color) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#08090d'; ctx.fillRect(0,0,W,H);
  const col = color || '#00e5ff';
  const seg = W/4;
  const aN = atk/255, dN = dcy/255, sN = sus/100, rN = rel/255;
  const pts = [
    [0, H-2],
    [seg*aN*1.5+2, 2],
    [seg + seg*dN, (1-sN)*(H-4)+2],
    [W - seg*rN, (1-sN)*(H-4)+2],
    [W-2, H-2]
  ];
  ctx.beginPath(); ctx.moveTo(pts[0][0],pts[0][1]);
  pts.slice(1).forEach(([x,y])=>ctx.lineTo(x,y));
  ctx.strokeStyle = col; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = col + '18';
  ctx.lineTo(W,H-2); ctx.lineTo(0,H-2); ctx.closePath(); ctx.fill();
  pts.slice(1,-1).forEach(([x,y])=>{
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
  });
}

function drawFilterCurve(canvas, cutoff, reso, type) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#08090d'; ctx.fillRect(0,0,W,H);
  const cx = (cutoff/1022)*W, rN = reso/100;
  const isHP = type && type.includes('high');
  ctx.beginPath();
  if (isHP) {
    ctx.moveTo(0, H-2); ctx.lineTo(cx*0.6, H-2);
    ctx.quadraticCurveTo(cx, H-2-rN*H*0.5, cx, H*0.3); ctx.lineTo(W, H*0.3);
  } else {
    ctx.moveTo(0, H*0.25); ctx.lineTo(cx*0.7, H*0.25);
    ctx.quadraticCurveTo(cx, H*0.25-rN*H*0.5, cx, H*0.4); ctx.lineTo(cx, H-2);
  }
  ctx.strokeStyle = '#d500f9'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = '#d500f918';
  if (!isHP) { ctx.lineTo(0, H-2); } else { ctx.lineTo(W, H-2); ctx.lineTo(0, H-2); }
  ctx.closePath(); ctx.fill();
}

function drawWavePreview(canvas, wi) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#08090d'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle = '#00e676'; ctx.lineWidth = 1.5; ctx.beginPath();
  for (let i=0; i<=W; i++) {
    const t=i/W, ph=t*Math.PI*2;
    let y;
    if (wi===0) y=H/2-Math.sin(ph)*(H/2-2);
    else if (wi===1) y=H/2-(t<0.5?t*2-1:1-t*2)*(H/2-2)*2;
    else if (wi===2) y=H/2-(t-0.5)*(H-4);
    else if (wi===3) y=H/2+(t-0.5)*(H-4);
    else if (wi===4) y=t<0.5?4:H-4;
    else y=H/2+(Math.random()-.5)*(H-4);
    i===0?ctx.moveTo(i,y):ctx.lineTo(i,y);
  }
  ctx.stroke();
}

function drawLFOPreview(canvas, wi, rate) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const W=canvas.width, H=canvas.height;
  ctx.fillStyle='#08090d'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#ff6b00'; ctx.lineWidth=1.2; ctx.beginPath();
  for (let i=0;i<=W;i++){
    const t=i/W*3, ph=t*Math.PI*2;
    let y;
    if(wi===0) y=H/2-Math.sin(ph)*(H/2-2);
    else if(wi===1) y=H/2-(t%1<0.5?t%1*4-1:1-t%1*4)*(H/2-2);
    else if(wi===2) y=H/2-(t%1-.5)*(H-4);
    else y=t%1<0.5?4:H-4;
    i===0?ctx.moveTo(i,y):ctx.lineTo(i,y);
  }
  ctx.stroke();
}

        return html`<tr style=${'background:'+(src>0?'#001020':'')}>

// ── ARP SECTION ─────────────────────────────────────────────────
function renderArpSection() {
  // ARP byte offsets: pattern=220(bits 0-4), tempo mult=220(bits 5-7)
  // length=221(bits 0-3), octave range=221(bits 4-6)
  // span=222(bits 0-1), order=222(bits 3-5), mode=222(bits 6-7)
  // tempo=223(16bit)
  return html`<div class="section">
    <h4>ARP (Arpeggiator)</h4>
    <div class="param-row">
      <label class="w80">Pattern</label>
      <select style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:10px;border-radius:3px;padding:2px"
        onchange=${e=>{ sv(220,(gv(220,0)&0xE0)|(parseInt(e.target.value)&31)); render(); }}>
        ${ARP_PATTERNS.map((p,pi)=>html`<option value=${pi} selected=${(gv(220,0)&31)===pi}>${p}</option>`)}
      </select>
    </div>
    <div class="param-row">
      <label class="w80">Tempo Mult</label>
      <select style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:10px;border-radius:3px;padding:2px"
        onchange=${e=>{ sv(220,(gv(220,0)&31)|((parseInt(e.target.value)&7)<<5)); render(); }}>
        ${ARP_MULTS.map((m,mi)=>html`<option value=${mi} selected=${((gv(220,0)>>5)&7)===mi}>${m}</option>`)}
      </select>
    </div>
    <div class="param-row">
      <label class="w80">Length</label>
      <input type="range" min="0" max="14" value=${gv(221,0)&15} style="flex:1;accent-color:var(--cyan)"
        oninput=${e=>{ sv(221,(gv(221,0)&0x70)|(parseInt(e.target.value)&15)); render(); }} />
      <span class="val">${(gv(221,0)&15)+2}</span>
    </div>
    <div class="param-row">
      <label class="w80">Octave Range</label>
      <input type="range" min="0" max="4" value=${(gv(221,0)>>4)&7} style="flex:1;accent-color:var(--cyan)"
        oninput=${e=>{ sv(221,(gv(221,0)&15)|((parseInt(e.target.value)&7)<<4)); render(); }} />
      <span class="val">${(gv(221,0)>>4)&7}</span>
    </div>
    <div class="param-row">
      <label class="w80">Note Order</label>
      <select style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:10px;border-radius:3px;padding:2px"
        onchange=${e=>{ sv(222,(gv(222,0)&0xC7)|((parseInt(e.target.value)&7)<<3)); render(); }}>
        ${ARP_ORDERS.map((o,oi)=>html`<option value=${oi} selected=${((gv(222,0)>>3)&7)===oi}>${o}</option>`)}
      </select>
    </div>
  </div>`;
}

            oninput=${e=>{ sv(79,(b79&0x80)|(parseInt(e.target.value)&127)); render(); }} />

      <div>

        <div class="param-row">

          <label class="w80">Porta Time</label>

        </div>
        <div class="param-row">
          <label class="w80">Category</label>
          <select onchange=${e=>sv(86,parseInt(e.target.value))}>

      </select>

    <div class="trk-grid">
      ${Array.from({length:33},(_,i)=>html`<div class="trk-bar-col"
        style=${'height:'+Math.max(2,((gv(304+i,i*6.06-100)+100)/200)*46)+'px'}
        title=${'X='+(i-16)+' Y='+gv(304+i,Math.round(i*6.06-100))}
        onmousedown=${e=>{
          const rect=e.currentTarget.parentElement.getBoundingClientRect();
          const mm=ev=>{ const pct=1-(ev.clientY-rect.top)/rect.height; sv(304+i,Math.max(-100,Math.min(100,Math.round(pct*200-100)))); render(); };

          const pct=1-(e.clientY-rect.top)/rect.height; sv(304+i,Math.max(-100,Math.min(100,Math.round(pct*200-100)))); render();

function buildMIDIKeys(startNote, count) {
  const keys = [];
  let wPos = 0;
  for (let i=0; i<count; i++) {
    const pitch = startNote+i, blk = isBlack(pitch);
    if (!blk) { keys.push({pitch,blk,x:wPos*22}); wPos++; }
    else keys.push({pitch,blk});
  }
  let wi = 0;
  for (let i=0; i<keys.length; i++) {
    if (!keys[i].blk) wi++;
    else keys[i].x = (wi*22)-7;
  }
  return {keys, totalW: wPos*22};
}

            ontouchend=${e=>{ e.preventDefault(); sendNoteOff(note); S.pressedKeys.delete(note); render(); }}>
            <span style="font-size:11px;color:var(--text);font-weight:700">${NOTE_NAMES[note%12]}${Math.floor(note/12)-1}</span>
            <div class="vel-bar" style=${S.pressedKeys.has(note)?'transform:scaleX(1)':'transform:scaleX(0)'}></div>
          </div>`)}
        </div>
        <div style="display:flex;gap:6px;margin-top:6px;align-items:center">
          <button class="tbtn" onclick=${()=>allNotesOff()}>All Off</button>
          <span style="font-size:10px;color:var(--text2)">Click high=soft, low=loud</span>
        </div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;flex-shrink:0">
        <div>
          <div style="font-size:9px;color:var(--cyan);font-family:'Orbitron',sans-serif;margin-bottom:4px">XY PAD</div>
          <div class="xy-pad" id="xypad"
            onmousedown=${e=>{ const r=e.currentTarget.getBoundingClientRect(); const xv=Math.round((e.clientX-r.left)/r.width*1022); const yv=Math.round((1-(e.clientY-r.top)/r.height)*100); sv(126,xv); sv(130,yv); render(); }}
            onmousemove=${e=>{ if(e.buttons!==1) return; const r=e.currentTarget.getBoundingClientRect(); const xv=Math.round((e.clientX-r.left)/r.width*1022); const yv=Math.round((1-(e.clientY-r.top)/r.height)*100); sv(126,xv); sv(130,yv); render(); }}
            ontouchmove=${e=>{ e.preventDefault(); const r=e.currentTarget.getBoundingClientRect(); const t=e.touches[0]; const xv=Math.round((t.clientX-r.left)/r.width*1022); const yv=Math.round((1-(t.clientY-r.top)/r.height)*100); sv(126,xv); sv(130,yv); render(); }}>
            <div class="xy-thumb" style=${'left:'+Math.round(gv(126,512)/1022*100)+'%;top:'+Math.round((1-gv(130,0)/100)*100)+'%'}></div>
            <span style="position:absolute;bottom:3px;left:4px;font-size:8px;color:var(--text3)">F1 Cut</span>
            <span style="position:absolute;top:3px;left:4px;font-size:8px;color:var(--text3);writing-mode:vertical-rl;transform:rotate(180deg)">Res</span>
          </div>
        </div>
        <div style="display:flex;gap:8px">
          <div>
            <div style="font-size:9px;color:var(--cyan);font-family:'Orbitron',sans-serif;margin-bottom:3px">PB</div>
            <div class="pitch-strip"
              onmousedown=${e=>{ const r=e.currentTarget.getBoundingClientRect(); const pct=1-(e.clientY-r.top)/r.height; S.pbVal=Math.max(0,Math.min(127,Math.round(pct*127))); midiOut([0xE0|(S.midi.channel-1),0,S.pbVal]); render(); }}
              onmousemove=${e=>{ if(e.buttons!==1) return; const r=e.currentTarget.getBoundingClientRect(); const pct=1-(e.clientY-r.top)/r.height; S.pbVal=Math.max(0,Math.min(127,Math.round(pct*127))); midiOut([0xE0|(S.midi.channel-1),0,S.pbVal]); render(); }}
              onmouseup=${()=>{ S.pbVal=64; midiOut([0xE0|(S.midi.channel-1),0,64]); render(); }}>
              <div class="pitch-thumb" style=${'top:'+Math.max(0,Math.round((1-S.pbVal/127)*98))+'px'}></div>
            </div>
            <span style="font-size:8px;color:var(--text3)">${S.pbVal-64}</span>
          </div>
          <div>
            <div style="font-size:9px;color:var(--orange);font-family:'Orbitron',sans-serif;margin-bottom:3px">MOD</div>
            <div class="pitch-strip"
              onmousedown=${e=>{ const r=e.currentTarget.getBoundingClientRect(); S.modWheelVal=Math.max(0,Math.min(127,Math.round((1-(e.clientY-r.top)/r.height)*127))); sendCC(1,S.modWheelVal); render(); }}
              onmousemove=${e=>{ if(e.buttons!==1) return; const r=e.currentTarget.getBoundingClientRect(); S.modWheelVal=Math.max(0,Math.min(127,Math.round((1-(e.clientY-r.top)/r.height)*127))); sendCC(1,S.modWheelVal); render(); }}>
              <div class="pitch-thumb" style=${'top:'+Math.max(0,Math.round((1-S.modWheelVal/127)*98))+'px'}></div>
            </div>
            <span style="font-size:8px;color:var(--text3)">${S.modWheelVal}</span>
          </div>
        </div>
      </div>
      <div style="flex:1;min-width:180px">
        <div style="font-size:9px;color:var(--cyan);font-family:'Orbitron',sans-serif;margin-bottom:6px">PERFORMANCE</div>
        <div class="section" style="margin-bottom:8px">
          <h4>Arpeggiator</h4>
          <div style="display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:6px">
            <button class=${'tbtn'+(S.arpActive?' active':'')} onclick=${()=>{ S.arpActive=!S.arpActive; S.arpStep=0; render(); }}>ARP ${S.arpActive?'ON':'OFF'}</button>
            <select style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:10px;border-radius:3px;padding:2px 4px"
              onchange=${e=>{ S.arpMode=e.target.value; render(); }}>
              ${['up','down','updown','random'].map(m=>html`<option value=${m} selected=${S.arpMode===m}>${m}</option>`)}
            </select>
          </div>
          <div class="param-row">
            <label class="w60">Rate</label>
            <input type="range" min="1" max="32" value=${S.arpRate} style="flex:1;accent-color:var(--cyan)"
              oninput=${e=>{ S.arpRate=parseInt(e.target.value); render(); }} />
            <span class="val">${S.arpRate}</span>
          </div>
          <div class="param-row">
            <label class="w60">Octaves</label>
            <input type="range" min="1" max="4" value=${S.arpOctaves} style="flex:1;accent-color:var(--cyan)"
              oninput=${e=>{ S.arpOctaves=parseInt(e.target.value); render(); }} />
            <span class="val">${S.arpOctaves}</span>
          </div>
          <div class="arp-viz">
            ${Array.from({length:16},(_,i)=>html`<div class=${'arp-dot'+(S.arpVizStep===i?' active':'')}></div>`)}
          </div>
        </div>
        <div class="section" style="margin-bottom:8px">
          <h4>Chord Memory</h4>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:6px;align-items:center">
            <button class=${'tbtn'+(S.chordMode?' active':'')} onclick=${()=>{ S.chordMode=!S.chordMode; render(); }}>CHORD ${S.chordMode?'ON':'OFF'}</button>
            <select style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:10px;border-radius:3px;padding:2px 4px"
              onchange=${e=>{ S.chordIntervals=CHORD_PRESETS[e.target.value]||[]; render(); }}>
              ${Object.keys(CHORD_PRESETS).map(k=>html`<option value=${k}>${k}</option>`)}
            </select>
          </div>
          ${S.chordIntervals.length?html`<div style="font-size:10px;color:var(--text2)">+${S.chordIntervals.join(', ')} semitones</div>`:null}
        </div>
        <div class="section">
          <h4>Scale Lock</h4>
          <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
            <select style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:10px;border-radius:3px;padding:2px 4px"
              onchange=${e=>{ S.scale=SCALES[e.target.value]; render(); }}>
              ${Object.keys(SCALES).map(k=>html`<option value=${k} selected=${S.scale===SCALES[k]||(S.scale===null&&k==='Chromatic')}>${k}</option>`)}
            </select>
            <select style="background:var(--bg);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:10px;border-radius:3px;padding:2px 4px"
              onchange=${e=>{ S.scaleRoot=parseInt(e.target.value); render(); }}>
              ${NOTE_NAMES.map((n,i)=>html`<option value=${i} selected=${S.scaleRoot%12===i}>${n}</option>`)}
            </select>
          </div>
          ${S.scale?html`<div style="font-size:10px;color:var(--text2);margin-top:4px">Notes: ${S.scale.map(i=>(NOTE_NAMES[(i+S.scaleRoot)%12])).join(' ')}</div>`:null}
        </div>
      </div>
    </div>
    ${renderNRPNBrowser()}
  </div>`;
}

// ── SHORTCUTS OVERLAY ────────────────────────────────────────────
function renderShortcuts() {
  return html`<div class=${'overlay'+(S.shortcutsVisible?' show':'')} onclick=${e=>{ if(e.target===e.currentTarget){S.shortcutsVisible=false;render();} }}>
    <div class="overlay-box">
      <h3>Keyboard Shortcuts</h3>
      <table>
        <tr><td><kbd>Q-P / A-J</kbd></td><td>Input notes (QWERTY piano)</td></tr>
        <tr><td><kbd>2 3 5 6 7</kbd></td><td>Black keys (sharps)</td></tr>
        <tr><td><kbd>Z / X</kbd></td><td>Octave down / up</td></tr>
        <tr><td><kbd>Space</kbd></td><td>Commit step + advance</td></tr>
        <tr><td><kbd>Backspace</kbd></td><td>Clear current step</td></tr>
        <tr><td><kbd>← →</kbd></td><td>Move cursor</td></tr>
        <tr><td><kbd>↑ ↓</kbd></td><td>Scroll piano roll pitch</td></tr>
        <tr><td><kbd>1-9</kbd></td><td>Step length</td></tr>
        <tr><td><kbd>Ctrl+Space</kbd></td><td>Play / Stop</td></tr>
        <tr><td><kbd>Ctrl+R</kbd></td><td>Record toggle</td></tr>
        <tr><td><kbd>Ctrl+Z</kbd></td><td>Undo</td></tr>
        <tr><td><kbd>Ctrl+S</kbd></td><td>Save</td></tr>
        <tr><td><kbd>T</kbd></td><td>Tap tempo</td></tr>
        <tr><td><kbd>M</kbd></td><td>Metronome toggle</td></tr>
        <tr><td><kbd>?</kbd></td><td>This help</td></tr>
        <tr><td><kbd>Esc</kbd></td><td>Close overlay</td></tr>
        <tr><td>Ctrl+Scroll</td><td>Zoom X (piano roll)</td></tr>
        <tr><td>Shift+Scroll</td><td>Zoom Y (piano roll)</td></tr>
        <tr><td>Alt+Scroll</td><td>Scroll pitch</td></tr>
      </table>
      <button class="tbtn active" style="margin-top:12px" onclick=${()=>{ S.shortcutsVisible=false; render(); }}>Close</button>
    </div>
  </div>`;
}

// ── MAIN RENDER ──────────────────────────────────────────────────
const TABS = [
  {id:'seq',label:'Sequencer'},
  {id:'patch',label:'Patch Editor'},
  {id:'patterns',label:'Patterns'},
  {id:'midi',label:'MIDI'},
  {id:'sysex',label:'SysEx'},
  {id:'perf',label:'Perf'},
];

function render() {
  const ok = !!S.midi.output;
  applyDiff(document.getElementById('app'), html`<div style="display:flex;flex-direction:column;height:100%;overflow:hidden">
    <div id="toolbar">
      <span class="brand">MICRO<span>N</span></span>
      <div class="sep"></div>
      <button class=${'tbtn'+(S.playing?' stop':' play')} onclick=${()=>togglePlay()}>${S.playing?'⏹':'▶'}</button>
      <button class=${'tbtn rec'+(S.recording?' on':'')} title="Record" onclick=${()=>{ S.recording=!S.recording; render(); }}>⏺</button>
      <div class="sep"></div>
      <label style="color:var(--text2);font-size:10px">BPM</label>
      <input class="bpm-in" type="number" value=${S.bpm} min="20" max="300"
        oninput=${e=>{ S.bpm=Math.max(20,Math.min(300,parseInt(e.target.value)||120)); }} />
      <button class="tbtn" style="font-size:10px;padding:2px 5px" onclick=${()=>{ tapTempo(); render(); }}>TAP</button>
      <div class="sep"></div>
      <button class=${'tbtn'+(S.metronome?' active':'')} title="Metronome" onclick=${()=>{ S.metronome=!S.metronome; if(S.metronome&&!S.audioCtx) S.audioCtx=new AudioContext(); render(); }}>♪</button>
      <button class=${'tbtn'+(S.loop?' active':'')} title="Loop" onclick=${()=>{ S.loop=!S.loop; render(); }}>↻</button>
      <div class="sep"></div>
      <span class="pos-display">${S.playing?posDisplay():'1.1.1'}</span>
      <div class="sep"></div>
      <svg class="dbounce-ring" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle class="track" cx="12" cy="12" r="10"/>
        <circle id="dring" class="fill" cx="12" cy="12" r="10" style="stroke-dashoffset:63"/>
      </svg>
      <div class="sep"></div>
      <span class=${'midi-dot'+(ok?' ok':'')+(S.midiRxFlash?' rx':'')} title=${ok?'MIDI connected':'No MIDI'}></span>
      <div class="sep"></div>
      <button class="tbtn" title="Save (Ctrl+S)" onclick=${()=>{ saveState(); render(); }}>Save</button>
      <span class=${'unsaved'+(S.unsaved?' show':'')}>*</span>
      <div class="sep"></div>
      <button class="tbtn" onclick=${()=>{ S.theme=S.theme==='dark'?'light':'dark'; document.body.className=S.theme==='light'?'light':''; render(); }}>${S.theme==='dark'?'Light':'Dark'}</button>
      <button class="tbtn" onclick=${()=>{ S.shortcutsVisible=!S.shortcutsVisible; render(); }}>?</button>
    </div>
    <div id="tabs-bar">
      ${TABS.map(t=>html`<button class=${'tab-btn'+(S.tab===t.id?' active':'')} onclick=${()=>{ S.tab=t.id; render(); }}>${t.label}</button>`)}
    </div>
    <div id="roll-wrap" style=${'height:'+rollH()+'px'}><canvas id="roll"></canvas></div>
    <div id="roll-resizer" style="height:5px;cursor:ns-resize;background:var(--border);flex-shrink:0"></div>
    <div id="panel">
      ${S.tab==='seq'      ? renderSeq()      : null}
      ${S.tab==='patch'    ? renderPatch()    : null}
      ${S.tab==='patterns' ? renderPatterns() : null}
      ${S.tab==='midi'     ? renderMidi()     : null}
      ${S.tab==='sysex'    ? renderSysex()    : null}
      ${S.tab==='perf'     ? renderPerf()     : null}
    </div>
  </div>`);
  // Shortcuts overlay (portal outside applyDiff scope)
  let ov = document.getElementById('shortcuts-ov');
  if (!ov) { ov=document.createElement('div'); ov.id='shortcuts-ov'; document.body.appendChild(ov); }
  applyDiff(ov, renderShortcuts());

  // Canvas init/redraw
  const rollEl = document.getElementById('roll');
  if (!RC || RC !== rollEl) setTimeout(initCanvas, 0);
  else drawRoll();
}

// ── INIT ──────────────────────────────────────────────────────────
loadState();
render();
setTimeout(initCanvas, 50);
document.addEventListener('keydown', onKeyDown);
document.addEventListener('keyup', onKeyUp);
requestAnimationFrame(pollGamepad);
initMIDI();
window.S = S;
window.sendNRPN = sendNRPN;
window.drawRoll = drawRoll;
window.render = render;

</script>
</body>
</html>
