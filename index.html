<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Alesis Micron Editor</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/rippleui@1.12.1/dist/css/styles.css">
<style>
*{box-sizing:border-box}
body{background:#0f1117;color:#e2e8f0;font-family:system-ui,sans-serif;margin:0;height:100vh;overflow:hidden;display:flex;flex-direction:column}
#app{display:flex;flex-direction:column;height:100vh;min-height:0}
.tabs{display:flex;gap:2px;padding:6px 8px 0;background:#0f1117;border-bottom:1px solid #2d3748;flex-shrink:0}
.tab{padding:6px 14px;border-radius:6px 6px 0 0;cursor:pointer;font-size:13px;background:#1a202c;color:#a0aec0;border:1px solid #2d3748;border-bottom:none;transition:background .15s}
.tab.on{background:#2d3748;color:#fff}
.panel{flex:1;overflow:auto;padding:12px;display:none;min-height:0}
.panel.on{display:flex;flex-direction:column;gap:8px}
#sp{padding:0;overflow:hidden}
#sp.on{flex-direction:column}
#tb{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#1a202c;border-bottom:1px solid #2d3748;flex-shrink:0;flex-wrap:wrap}
#tb label{font-size:12px;color:#a0aec0;display:flex;align-items:center;gap:4px}
#tb input[type=number]{width:52px;background:#2d3748;border:1px solid #4a5568;color:#e2e8f0;border-radius:4px;padding:2px 4px;font-size:12px}
#tb select{background:#2d3748;border:1px solid #4a5568;color:#e2e8f0;border-radius:4px;padding:2px 4px;font-size:12px}
#tb input[type=range]{width:70px}
.btn{padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;border:1px solid #4a5568;background:#2d3748;color:#e2e8f0}
.btn.pri{background:#3182ce;border-color:#2b6cb0;color:#fff}
.btn.dan{background:#9b2c2c;border-color:#742a2a}
#roll-wrap{flex:1;display:flex;overflow:hidden;position:relative;min-height:0}
canvas{display:block;touch-action:none}
#hint{padding:4px 10px;background:#1a202c;font-size:11px;color:#4a5568;flex-shrink:0}
.stabs{display:flex;gap:2px;flex-wrap:wrap;margin-bottom:8px}
.stab{padding:4px 10px;border-radius:4px;cursor:pointer;font-size:12px;background:#1a202c;color:#a0aec0;border:1px solid #2d3748}
.stab.on{background:#2d3748;color:#fff}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.pcard{background:#1a202c;border:1px solid #2d3748;border-radius:6px;padding:8px}
.pcard label{font-size:11px;color:#718096;display:block;margin-bottom:2px}
.pcard input[type=range]{width:100%}
.pcard .val{font-size:11px;color:#63b3ed;float:right}
.pcard select{width:100%;background:#2d3748;border:1px solid #4a5568;color:#e2e8f0;border-radius:4px;font-size:12px}
.sec{font-size:11px;font-weight:700;color:#718096;text-transform:uppercase;letter-spacing:.05em;padding:4px 0;border-bottom:1px solid #2d3748;margin:6px 0 4px}
.mod-table{width:100%;border-collapse:collapse;font-size:12px}
.mod-table th{text-align:left;padding:4px 6px;color:#718096;border-bottom:1px solid #2d3748}
.mod-table td{padding:3px 4px;border-bottom:1px solid #1a202c}
.mod-table select{background:#1a202c;border:1px solid #2d3748;color:#e2e8f0;border-radius:3px;font-size:11px;padding:1px 2px}
.mod-table input[type=range]{width:70px}
.pat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.pat-card{background:#1a202c;border:1px solid #2d3748;border-radius:6px;padding:8px;cursor:pointer;transition:border-color .15s}
.pat-card.on{border-color:#3182ce}
.pat-card input{background:transparent;border:none;color:inherit;width:100%;font-weight:700;font-size:13px;padding:0}
.chain{display:flex;flex-wrap:wrap;gap:4px;min-height:32px;padding:6px;background:#1a202c;border-radius:6px;border:1px solid #2d3748}
.ci{padding:3px 8px;background:#2d3748;border-radius:3px;cursor:pointer;font-size:12px}
.midi-dot{width:10px;height:10px;border-radius:50%;background:#4a5568;display:inline-block}
.midi-dot.ok{background:#48bb78}
.dbar-wrap{background:#2d3748;border-radius:2px;height:4px;width:80px}
.dbar{height:100%;background:#63b3ed;border-radius:2px;transition:width .1s}
#stepinfo{font-size:12px;color:#a0aec0}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { h, applyDiff } from 'https://esm.sh/webjsx@0.4.0';

// ── State ─────────────────────────────────────────────────────────────────────
const mkPat = (name, len=16) => ({
  name, length: len,
  steps: Array.from({length:len}, ()=>({notes:[], len:1/16}))
});
const S = {
  tab: 'seq', ptab: 'osc',
  midi: { outputs:[], output:null, channel:1 },
  transport: { playing:false, bpm:120, step:0, audioCtx:null },
  seq: {
    patterns: Array.from({length:16},(_,i)=>mkPat(`Pat ${i+1}`)),
    activePattern:0, cursor:0, scrollX:0, scrollY:40,
    zoomX:1, zoomY:1, stepLen:1/16,
    pendingNotes:[], debounceStart:0, debounceTimer:null,
    chain:[], chainPos:0
  },
  patch:{}, gamepad:{ connected:false }
};

// ── MIDI ──────────────────────────────────────────────────────────────────────
async function initMIDI() {
  if (!navigator.requestMIDIAccess) return;
  try {
    const access = await navigator.requestMIDIAccess({sysex:false});
    const upd = () => {
      S.midi.outputs = [...access.outputs.values()];
      if (!S.midi.output && S.midi.outputs.length) S.midi.output = S.midi.outputs[0];
      render();
    };
    access.onstatechange = upd; upd();
    access.inputs.forEach(inp => { inp.onmidimessage = onMidiIn; });
  } catch(e) { console.warn('MIDI:', e); }
}
function onMidiIn(e) {
  const [st, d1, d2] = e.data;
  if ((st & 0xf0) === 0xb0 && d1 === 1) {
    const step = S.seq.patterns[S.seq.activePattern].steps[S.seq.cursor];
    step.len = Math.max(1/64, (d2/127) * 4);
    drawRoll(); render();
  }
}
const send = (...bytes) => S.midi.output?.send(bytes);
const sendNoteOn = (p,v=100) => send(0x8f|(S.midi.channel),p,v);
const sendNoteOff = (p) => send(0x7f|(S.midi.channel),p,0);
function sendNRPN(n, v) {
  const ch = S.midi.channel - 1;
  send(0xb0|ch, 99, n>>7); send(0xb0|ch, 98, n&127);
  send(0xb0|ch, 6, v>>7);  send(0xb0|ch, 38, v&127);
}

// ── Canvas Piano Roll ─────────────────────────────────────────────────────────
const BLACK = new Set([1,3,6,8,10]);
const NOTES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const noteName = n => NOTES[n%12]+(Math.floor(n/12)-2);
let rollC, keysC, rollCtx, keysCtx, dragging=null;

function initCanvases() {
  const wrap = document.getElementById('roll-wrap');
  if (!wrap) return;
  if (!rollC) {
    keysC = document.createElement('canvas');
    keysC.style.flexShrink = '0';
    rollC = document.createElement('canvas');
    rollC.style.flex = '1';
    wrap.appendChild(keysC);
    wrap.appendChild(rollC);
    rollCtx = rollC.getContext('2d');
    keysCtx = keysC.getContext('2d');
    rollC.addEventListener('mousedown', onMD);
    rollC.addEventListener('mousemove', onMM);
    rollC.addEventListener('mouseup', ()=>dragging=null);
    rollC.addEventListener('contextmenu', e=>e.preventDefault());
    rollC.addEventListener('wheel', onWheel, {passive:false});
    rollC.addEventListener('touchstart', onTS, {passive:false});
    rollC.addEventListener('touchmove', onTM, {passive:false});
    rollC.addEventListener('touchend', ()=>{ dragging=null; lastPinch=null; });
  }
  drawRoll();
}

function drawRoll() {
  if (!rollC || !rollCtx) return;
  const wrap = document.getElementById('roll-wrap');
  if (!wrap) return;
  const W = wrap.clientWidth - 56, H = wrap.clientHeight;
  rollC.width = W; rollC.height = H;
  keysC.width = 56; keysC.height = H;
  const {zoomX, zoomY, scrollX, scrollY, cursor} = S.seq;
  const sw = Math.max(12, 22*zoomX), rh = Math.max(6, 14*zoomY);
  const rows = Math.ceil(H/rh)+2, top = 127-Math.round(scrollY);
  const pat = S.seq.patterns[S.seq.activePattern];

  // keys
  keysCtx.fillStyle='#0d1117'; keysCtx.fillRect(0,0,56,H);
  for (let i=0;i<rows;i++) {
    const n=top-i; if(n<0||n>127) continue;
    const y=i*rh, blk=BLACK.has(n%12);
    keysCtx.fillStyle = blk?'#1a202c':'#cbd5e0';
    keysCtx.fillRect(0,y,54,rh-1);
    if (n%12===0) {
      keysCtx.fillStyle='#2b6cb0';
      keysCtx.font=`${Math.max(8,rh-3)}px monospace`;
      keysCtx.fillText(noteName(n),2,y+rh-2);
    }
  }

  // grid bg
  rollCtx.fillStyle='#0f1117'; rollCtx.fillRect(0,0,W,H);
  for (let i=0;i<rows;i++) {
    const n=top-i, y=i*rh, blk=BLACK.has((n+128)%12);
    if (blk) { rollCtx.fillStyle='#0d1117'; rollCtx.fillRect(0,y,W,rh-1); }
    if (n%12===0) { rollCtx.strokeStyle='#2d3748'; rollCtx.lineWidth=1; rollCtx.beginPath(); rollCtx.moveTo(0,y); rollCtx.lineTo(W,y); rollCtx.stroke(); }
  }
  for (let c=0;c<pat.length;c++) {
    const x=c*sw-scrollX*sw; if(x<-sw||x>W) continue;
    rollCtx.strokeStyle = c%4===0?'#4a5568':'#2d3748';
    rollCtx.lineWidth = c%4===0?1.5:.5;
    rollCtx.beginPath(); rollCtx.moveTo(x,0); rollCtx.lineTo(x,H); rollCtx.stroke();
    if (c%4===0) { rollCtx.fillStyle='#4a5568'; rollCtx.font='9px monospace'; rollCtx.fillText(c+1,x+2,10); }
  }

  // notes
  pat.steps.forEach((step,ci) => {
    const x=ci*sw-scrollX*sw; if(x<-sw||x>W) return;
    step.notes.forEach(n => {
      const row=top-n.pitch; if(row<0||row>rows+2) return;
      const y=row*rh, nw=Math.max(4,step.len/(1/16)*sw-2);
      rollCtx.fillStyle=`hsl(${(n.pitch*2.8)%360},55%,48%)`;
      rollCtx.fillRect(x+1,y+1,nw-2,rh-3);
      if (nw>18) { rollCtx.fillStyle='#fff'; rollCtx.font=`${Math.max(7,rh-4)}px monospace`; rollCtx.fillText(noteName(n.pitch),x+3,y+rh-3); }
    });
  });

  // cursor col
  const cx=cursor*sw-scrollX*sw;
  rollCtx.fillStyle='rgba(255,255,255,.06)'; rollCtx.fillRect(cx,0,sw-1,H);
  rollCtx.strokeStyle='#63b3ed'; rollCtx.lineWidth=2; rollCtx.strokeRect(cx,0,sw-1,H);

  // playhead
  if (S.transport.playing) {
    const px=S.transport.step*sw-scrollX*sw;
    rollCtx.strokeStyle='#f6e05e'; rollCtx.lineWidth=2;
    rollCtx.beginPath(); rollCtx.moveTo(px,0); rollCtx.lineTo(px,H); rollCtx.stroke();
  }

  // pending notes indicator
  if (S.seq.pendingNotes.length>0) {
    rollCtx.fillStyle='rgba(99,179,237,.15)'; rollCtx.fillRect(cx,0,sw-1,H);
  }

  updateDbar();
}

function rollCoords(x,y) {
  const {zoomX,zoomY,scrollX,scrollY}=S.seq;
  const sw=Math.max(12,22*zoomX), rh=Math.max(6,14*zoomY);
  const top=127-Math.round(scrollY);
  return {col:Math.floor((x+scrollX*sw)/sw), pitch:top-Math.floor(y/rh)};
}

function onMD(e) {
  e.preventDefault();
  const {col,pitch}=rollCoords(e.offsetX,e.offsetY);
  const pat=S.seq.patterns[S.seq.activePattern];
  if(col<0||col>=pat.length||pitch<0||pitch>127) return;
  S.seq.cursor=col;
  const step=pat.steps[col];
  if (e.button===2) { step.notes=step.notes.filter(n=>n.pitch!==pitch); }
  else {
    const idx=step.notes.findIndex(n=>n.pitch===pitch);
    if(idx>=0) dragging={col,pitch};
    else { step.notes.push({pitch,vel:100}); dragging={col,pitch}; }
  }
  drawRoll(); render();
}
function onMM(e) {
  if(!dragging) return;
  const sw=Math.max(12,22*S.seq.zoomX);
  const step=S.seq.patterns[S.seq.activePattern].steps[dragging.col];
  const dx=e.offsetX-(dragging.col*sw-S.seq.scrollX*sw);
  step.len=Math.max(1/64, Math.round(dx/sw*16)/16||1/16);
  drawRoll();
}
function onWheel(e) {
  e.preventDefault();
  if(e.ctrlKey) S.seq.zoomX=Math.max(.5,Math.min(4,S.seq.zoomX-e.deltaY*.01));
  else if(e.shiftKey) S.seq.zoomY=Math.max(.5,Math.min(4,S.seq.zoomY-e.deltaY*.01));
  else { S.seq.scrollX=Math.max(0,S.seq.scrollX+e.deltaX*.05); S.seq.scrollY=Math.max(0,Math.min(120,S.seq.scrollY+e.deltaY*.1)); }
  drawRoll();
}
let lastPinch=null;
function onTS(e) {
  e.preventDefault();
  if(e.touches.length===2) { const d=ptDist(e.touches); lastPinch=d; }
  else { const r=rollC.getBoundingClientRect(); onMD({offsetX:e.touches[0].clientX-r.left,offsetY:e.touches[0].clientY-r.top,button:0,preventDefault:()=>{}}); }
}
function onTM(e) {
  e.preventDefault();
  if(e.touches.length===2&&lastPinch) {
    const d=ptDist(e.touches), scale=d/lastPinch;
    S.seq.zoomX=Math.max(.5,Math.min(4,S.seq.zoomX*scale)); lastPinch=d; drawRoll();
  }
}
const ptDist=ts=>Math.hypot(ts[0].clientX-ts[1].clientX,ts[0].clientY-ts[1].clientY);

// ── Keyboard ──────────────────────────────────────────────────────────────────
const KEY_MAP = new Map([
  ['q',60],['w',62],['e',64],['r',65],['t',67],['y',69],['u',71],['i',72],['o',74],['p',76],
  ['a',48],['s',50],['d',52],['f',53],['g',55],['h',57],['j',59],['k',60],
  ['2',61],['3',63],['5',66],['6',68],['7',70],
]);
const LEN_MAP = {'1':1/16,'2':1/8,'3':1/4,'4':1/2,'5':1,'6':1.5,'7':2,'8':3,'9':4};
const DEBOUNCE = 2000;

function addPending(pitch) {
  const now = performance.now();
  const expired = !S.seq.debounceTimer || (now-S.seq.debounceStart)>DEBOUNCE;
  if (expired) S.seq.pendingNotes=[];
  if (!S.seq.pendingNotes.find(n=>n.pitch===pitch)) S.seq.pendingNotes.push({pitch,vel:100});
  S.seq.debounceStart=now;
  clearTimeout(S.seq.debounceTimer);
  S.seq.debounceTimer=setTimeout(()=>{ S.seq.debounceTimer=null; drawRoll(); },DEBOUNCE);
  const step=S.seq.patterns[S.seq.activePattern].steps[S.seq.cursor];
  step.notes=[...S.seq.pendingNotes]; step.len=S.seq.stepLen;
  sendNoteOn(pitch); setTimeout(()=>sendNoteOff(pitch),200);
  drawRoll(); render();
}
function commitStep() {
  const pat=S.seq.patterns[S.seq.activePattern];
  if (!S.seq.pendingNotes.length) pat.steps[S.seq.cursor].notes=[];
  S.seq.pendingNotes=[]; clearTimeout(S.seq.debounceTimer); S.seq.debounceTimer=null;
  S.seq.cursor=Math.min(pat.length-1,S.seq.cursor+1);
  autoScroll(); drawRoll(); render();
}
function clearStep() {
  S.seq.patterns[S.seq.activePattern].steps[S.seq.cursor].notes=[];
  S.seq.pendingNotes=[]; drawRoll(); render();
}
function autoScroll() {
  const sw=Math.max(12,22*S.seq.zoomX), W=rollC?rollC.width:400;
  const vis=Math.floor(W/sw);
  if(S.seq.cursor>=S.seq.scrollX+vis) S.seq.scrollX=S.seq.cursor-vis+1;
}
function updateDbar() {
  const bar=document.getElementById('dbar'); if(!bar) return;
  if(!S.seq.debounceTimer) { bar.style.width='0%'; return; }
  const pct=Math.max(0,100-(performance.now()-S.seq.debounceStart)/DEBOUNCE*100);
  bar.style.width=pct+'%';
  if(S.seq.debounceTimer) requestAnimationFrame(updateDbar);
}

document.addEventListener('keydown', e => {
  if(['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  const k=e.key.toLowerCase();
  if(k===' ') { e.preventDefault(); commitStep(); return; }
  if(k==='backspace') { e.preventDefault(); clearStep(); return; }
  if(k==='arrowleft') { e.preventDefault(); S.seq.cursor=Math.max(0,S.seq.cursor-1); drawRoll(); render(); return; }
  if(k==='arrowright') { e.preventDefault(); const pat=S.seq.patterns[S.seq.activePattern]; S.seq.cursor=Math.min(pat.length-1,S.seq.cursor+1); drawRoll(); render(); return; }
  if(k==='arrowup') { e.preventDefault(); S.seq.scrollY=Math.max(0,S.seq.scrollY-1); drawRoll(); return; }
  if(k==='arrowdown') { e.preventDefault(); S.seq.scrollY=Math.min(120,S.seq.scrollY+1); drawRoll(); return; }
  const numKey = e.code.startsWith('Numpad') ? e.code.replace('Numpad','') : k;
  if(LEN_MAP[numKey]) { S.seq.stepLen=LEN_MAP[numKey]; render(); return; }
  const pitch=KEY_MAP.get(k);
  if(pitch!==undefined) { e.preventDefault(); addPending(pitch); }
});

// ── Gamepad ───────────────────────────────────────────────────────────────────
let gpPrev=null;
function pollGP() {
  const gp=navigator.getGamepads?.()[0];
  const was=gpPrev;
  if(gp) {
    S.gamepad.connected=true;
    const [lx,ly]=gp.axes;
    const pressed=(i)=>gp.buttons[i]?.pressed;
    const wasP=(i)=>was?.buttons[i]?.pressed;
    if(pressed(14)||lx<-.6) { S.seq.cursor=Math.max(0,S.seq.cursor-1); drawRoll(); }
    if(pressed(15)||lx>.6) { const p=S.seq.patterns[S.seq.activePattern]; S.seq.cursor=Math.min(p.length-1,S.seq.cursor+1); drawRoll(); }
    if(pressed(12)||ly<-.6) { S.seq.scrollY=Math.max(0,S.seq.scrollY-1); drawRoll(); }
    if(pressed(13)||ly>.6) { S.seq.scrollY=Math.min(120,S.seq.scrollY+1); drawRoll(); }
    if(pressed(0)&&!wasP(0)) commitStep();
    if(pressed(1)&&!wasP(1)) clearStep();
    if(gp.buttons[6]?.value>.1) { S.seq.zoomX=Math.max(.5,S.seq.zoomX-.02); drawRoll(); }
    if(gp.buttons[7]?.value>.1) { S.seq.zoomX=Math.min(4,S.seq.zoomX+.02); drawRoll(); }
    gpPrev={buttons:Array.from(gp.buttons).map(b=>({pressed:b.pressed,value:b.value}))};
  } else { S.gamepad.connected=false; gpPrev=null; }
  requestAnimationFrame(pollGP);
}
requestAnimationFrame(pollGP);

// ── Transport ─────────────────────────────────────────────────────────────────
function getCtx() {
  if(!S.transport.audioCtx) S.transport.audioCtx=new AudioContext();
  if(S.transport.audioCtx.state==='suspended') S.transport.audioCtx.resume();
  return S.transport.audioCtx;
}
const stepDur=()=>60/S.transport.bpm/4;
let schTimer=null, nextT=0;
function curPat() {
  if(S.seq.chain.length) return S.seq.patterns[S.seq.chain[S.seq.chainPos%S.seq.chain.length]];
  return S.seq.patterns[S.seq.activePattern];
}
function sched() {
  if(!S.transport.playing) return;
  const ctx=getCtx();
  while(nextT<ctx.currentTime+.1) {
    const pat=curPat(), step=pat.steps[S.transport.step];
    step.notes.forEach(n=>{
      sendNoteOn(n.pitch,n.vel||100);
      setTimeout(()=>sendNoteOff(n.pitch),(Math.max(.05,step.len/(1/16)*stepDur()*.9)+(nextT-ctx.currentTime))*1000);
    });
    S.transport.step=(S.transport.step+1)%pat.length;
    if(!S.transport.step&&S.seq.chain.length) S.seq.chainPos=(S.seq.chainPos+1)%S.seq.chain.length;
    nextT+=stepDur();
    drawRoll();
  }
  schTimer=setTimeout(sched,25);
}
function togglePlay() {
  S.transport.playing=!S.transport.playing;
  if(S.transport.playing) { const ctx=getCtx(); S.transport.step=0; S.seq.chainPos=0; nextT=ctx.currentTime; sched(); }
  else { clearTimeout(schTimer); for(let i=0;i<128;i++) sendNoteOff(i); }
  render();
}

// ── Patch Data ────────────────────────────────────────────────────────────────
const fmtLen=l=>({[1/16]:'1/16',[1/8]:'1/8',[1/4]:'1/4',[1/2]:'1/2',1:'1',1.5:'3/2',2:'2',3:'3',4:'4'}[l]||(+l).toFixed(3));
const WAVES=['Sine','Tri','SawUp','SawDn','Pulse','Noise'];
const ENV_LOOP=['Off','Loop','PingPong'];
const FX1_TYPES=['bypass','pitch fx','chorus','flanger theta','flanger thru-0','phaser super','phaser string','vocoder 40-band'];
const FX2_TYPES=['bypass','delay mono','delay stereo','delay split L/R','reverb hall','reverb plate','reverb room'];
const MOD_SRC=['Off','PitchBend','ModWheel','Velocity','Aftertouch','LFO1','LFO2','SH','Env1','Env2','Env3','Osc1','Osc2','Osc3','Noise','Ext'];
const MOD_DST=['Off','Osc1Pitch','Osc2Pitch','Osc3Pitch','Osc1Fine','Osc2Fine','Osc3Fine','Osc1Wave','Osc2Wave','Osc3Wave','Filt1Cut','Filt2Cut','Filt1Res','Filt2Res','AmpLevel','FX1Prm','FX2Prm','PanBal','LFO1Rate','LFO2Rate'];

function oscParams(n) {
  const b=n*21;
  return [
    {l:'Pitch',nrpn:b,min:-24,max:24,def:0},{l:'Fine',nrpn:b+1,min:-99,max:99,def:0},
    {l:'Wave',nrpn:b+2,min:0,max:5,type:'sel',opts:WAVES},{l:'PulseWave',nrpn:b+3,min:0,max:127},
    {l:'SyncTune',nrpn:b+4,min:-24,max:24},{l:'FmAmt',nrpn:b+5,min:0,max:100},
    {l:'Level',nrpn:b+6,min:0,max:100}
  ];
}
function envParams(n) {
  const b=66+n*13;
  return [
    {l:'AtkTime',nrpn:b,min:0,max:255},{l:'AtkSlope',nrpn:b+1,min:0,max:2,type:'sel',opts:['Lin','Exp','Log']},
    {l:'DcyTime',nrpn:b+2,min:0,max:255},{l:'DcySlope',nrpn:b+3,min:0,max:2,type:'sel',opts:['Lin','Exp','Log']},
    {l:'SusTime',nrpn:b+4,min:0,max:256},{l:'SusLevel',nrpn:b+5,min:0,max:100},
    {l:'RelTime',nrpn:b+6,min:0,max:256},{l:'RelSlope',nrpn:b+7,min:0,max:2,type:'sel',opts:['Lin','Exp','Log']},
    {l:'Velocity',nrpn:b+8,min:0,max:100},{l:'Reset',nrpn:b+9,min:0,max:1,type:'sel',opts:['Off','On']},
    {l:'Freerun',nrpn:b+10,min:0,max:1,type:'sel',opts:['Off','On']},{l:'Loop',nrpn:b+11,min:0,max:3,type:'sel',opts:ENV_LOOP},
    {l:'SusPedal',nrpn:b+12,min:0,max:1,type:'sel',opts:['Off','On']}
  ];
}
function lfoParams(n) {
  const b=105+n*4;
  return [
    {l:'TempoSync',nrpn:b,min:0,max:1,type:'sel',opts:['Off','On']},
    {l:'Rate',nrpn:b+1,min:0,max:1023},{l:'RateSync',nrpn:b+2,min:0,max:24},
    {l:'Reset',nrpn:b+3,min:0,max:1,type:'sel',opts:['Off','On']}
  ];
}
const PATCH_SECTIONS = {
  osc: [
    {title:'Oscillator 1', params:oscParams(0)},
    {title:'Oscillator 2', params:oscParams(1)},
    {title:'Oscillator 3', params:oscParams(2)},
  ],
  filter: [
    {title:'Filter 1', params:[
      {l:'Cutoff',nrpn:63,min:0,max:255},{l:'Resonance',nrpn:64,min:0,max:100},
      {l:'Mode',nrpn:65,min:0,max:4,type:'sel',opts:['LP2','LP4','BP2','HP2','Notch']},
      {l:'BalEL',nrpn:66,min:0,max:100},{l:'PolyFilt',nrpn:67,min:0,max:1,type:'sel',opts:['Off','On']},
      {l:'KeyTrack',nrpn:68,min:0,max:200}
    ]},
    {title:'Filter 2', params:[
      {l:'Cutoff',nrpn:69,min:0,max:255},{l:'Resonance',nrpn:70,min:0,max:100},
      {l:'Mode',nrpn:71,min:0,max:4,type:'sel',opts:['LP2','LP4','BP2','HP2','Notch']},
      {l:'BalEL',nrpn:72,min:0,max:100},{l:'KeyTrack',nrpn:73,min:0,max:200}
    ]}
  ],
  env: [
    {title:'Envelope 1', params:envParams(0)},
    {title:'Envelope 2', params:envParams(1)},
    {title:'Envelope 3', params:envParams(2)},
  ],
  lfo: [
    {title:'LFO 1', params:lfoParams(0)},
    {title:'LFO 2', params:lfoParams(1)},
    {title:'S/H', params:lfoParams(2)},
  ],
  fx: [
    {title:'FX 1', params:[
      {l:'Type',nrpn:232,min:0,max:7,type:'sel',opts:FX1_TYPES},
      {l:'Feedbk',nrpn:233,min:0,max:100},{l:'ManIDly',nrpn:234,min:0,max:100},
      {l:'LfoRate',nrpn:235,min:0,max:100},{l:'LfoDpth',nrpn:236,min:0,max:100},
      {l:'LfoShap',nrpn:237,min:0,max:5,type:'sel',opts:WAVES},{l:'LfoSync',nrpn:238,min:0,max:1,type:'sel',opts:['Off','On']},
      {l:'NtchFrq',nrpn:239,min:0,max:100}
    ]},
    {title:'FX 2', params:[
      {l:'Type',nrpn:245,min:0,max:6,type:'sel',opts:FX2_TYPES},
      {l:'DelayTm',nrpn:246,min:0,max:680},{l:'Regen',nrpn:247,min:0,max:100},
      {l:'Bright',nrpn:248,min:0,max:100},{l:'Sync',nrpn:249,min:0,max:1,type:'sel',opts:['Off','On']},
      {l:'DlyLeft',nrpn:250,min:0,max:340},{l:'DlRight',nrpn:251,min:0,max:340},
      {l:'Diffusn',nrpn:252,min:0,max:100},{l:'Decay',nrpn:253,min:0,max:100},
    ]}
  ],
  track: [{title:'Track', params:[
    {l:'Input',nrpn:118,min:0,max:111},{l:'Preset',nrpn:119,min:0,max:9},
    {l:'Glide',nrpn:120,min:0,max:100},
    ...Array.from({length:33},(_,i)=>({l:`Pt${i-16}`,nrpn:121+i,min:-100,max:100}))
  ]}],
  mix: [{title:'Mix/Output', params:[
    {l:'O1 Level',nrpn:228,min:0,max:100},{l:'O2 Level',nrpn:229,min:0,max:100},
    {l:'O3 Level',nrpn:230,min:0,max:100},{l:'Noise',nrpn:231,min:0,max:100},
    {l:'Ring',nrpn:232,min:0,max:100},{l:'Output',nrpn:240,min:0,max:100},
    {l:'Drive',nrpn:241,min:0,max:100},{l:'Pan',nrpn:242,min:-64,max:63},
    {l:'FX Bal',nrpn:243,min:0,max:100}
  ]}]
};

function setPatch(nrpn,val) { S.patch[nrpn]=val; sendNRPN(nrpn,val); }
window.setPatch=setPatch;

// ── webjsx render ─────────────────────────────────────────────────────────────
const TABS=[{id:'seq',l:'Sequencer'},{id:'patch',l:'Patch'},{id:'patterns',l:'Patterns'},{id:'midi',l:'MIDI'}];
const PTABS=[{id:'osc',l:'Osc'},{id:'filter',l:'Filt'},{id:'env',l:'Env'},{id:'lfo',l:'LFO'},{id:'fx',l:'FX'},{id:'mod',l:'Mod'},{id:'track',l:'Track'},{id:'mix',l:'Mix'}];

function Param({p}) {
  const val=S.patch[p.nrpn]??p.def??0;
  if(p.type==='sel') return <div class="pcard">
    <label>{p.l} <span class="val">{p.opts[val]||val}</span></label>
    <select onchange={e=>setPatch(p.nrpn,+e.target.value)}>
      {p.opts.map((o,i)=><option value={i} selected={i===val}>{o}</option>)}
    </select>
  </div>;
  return <div class="pcard">
    <label>{p.l} <span class="val">{val}</span></label>
    <input type="range" min={p.min} max={p.max} value={val}
      oninput={e=>{ setPatch(p.nrpn,+e.target.value); e.target.previousElementSibling.querySelector('.val').textContent=e.target.value; }} />
  </div>;
}

function renderApp() {
  const pat=S.seq.patterns[S.seq.activePattern];
  applyDiff(document.getElementById('app'),
    <div id="app">
      <div class="tabs">
        {TABS.map(t=><div class={`tab${S.tab===t.id?' on':''}`} onclick={()=>{S.tab=t.id;render();}}>{t.l}</div>)}
      </div>

      {/* Sequencer */}
      <div id="sp" class={`panel${S.tab==='seq'?' on':''}`}>
        <div id="tb">
          <button class={`btn${S.transport.playing?' pri':''}`} onclick={togglePlay}>{S.transport.playing?'⏹ Stop':'▶ Play'}</button>
          <label>BPM <input type="number" value={S.transport.bpm} min="20" max="300" onchange={e=>S.transport.bpm=+e.target.value} /></label>
          <label>Pat
            <select onchange={e=>{S.seq.activePattern=+e.target.value;drawRoll();}}>
              {S.seq.patterns.map((p,i)=><option value={i} selected={i===S.seq.activePattern}>{p.name}</option>)}
            </select>
          </label>
          <label>Steps <input type="number" value={pat.length} min="1" max="64" onchange={e=>resizePat(+e.target.value)} /></label>
          <label>ZX <input type="range" min=".5" max="4" step=".1" value={S.seq.zoomX} oninput={e=>{S.seq.zoomX=+e.target.value;drawRoll();}} /></label>
          <label>ZY <input type="range" min=".5" max="4" step=".1" value={S.seq.zoomY} oninput={e=>{S.seq.zoomY=+e.target.value;drawRoll();}} /></label>
          <span id="stepinfo">Step {S.seq.cursor+1}/{pat.length} · {fmtLen(S.seq.stepLen)} {S.gamepad.connected?'🎮':''}</span>
          <div style="flex:1"></div>
          <div><div style="font-size:10px;color:#718096">Debounce</div><div class="dbar-wrap"><div class="dbar" id="dbar" style="width:0%"></div></div></div>
        </div>
        <div id="roll-wrap"></div>
        <div id="hint">Q-P=notes(C4-E5) · A-K=C3-C4 · 2/3/5/6/7=black keys · SPACE=step · BKSP=clear · 1-9/numpad=length · Arrows=navigate · ModWheel=note len</div>
      </div>

      {/* Patch */}
      <div class={`panel${S.tab==='patch'?' on':''}`}>
        <div class="stabs">{PTABS.map(t=><div class={`stab${S.ptab===t.id?' on':''}`} onclick={()=>{S.ptab=t.id;render();}}>{t.l}</div>)}</div>
        {S.ptab==='mod'
          ? <div style="overflow-x:auto"><table class="mod-table">
              <thead><tr><th>#</th><th>Source</th><th>Destination</th><th>Level</th><th>Offset</th></tr></thead>
              <tbody>{Array.from({length:12},(_,i)=>{
                const b=150+i*4;
                const src=S.patch[b]??0,dst=S.patch[b+1]??0,lvl=S.patch[b+2]??0,off=S.patch[b+3]??0;
                return <tr>
                  <td style="color:#718096">{i+1}</td>
                  <td><select onchange={e=>setPatch(b,+e.target.value)}>{MOD_SRC.map((s,j)=><option value={j} selected={j===src}>{s}</option>)}</select></td>
                  <td><select onchange={e=>setPatch(b+1,+e.target.value)}>{MOD_DST.map((s,j)=><option value={j} selected={j===dst}>{s}</option>)}</select></td>
                  <td><input type="range" min="-127" max="127" value={lvl} style="width:80px" oninput={e=>{setPatch(b+2,+e.target.value);e.target.nextElementSibling.textContent=e.target.value;}} /><span style="font-size:11px;margin-left:4px">{lvl}</span></td>
                  <td><input type="range" min="-127" max="127" value={off} style="width:80px" oninput={e=>{setPatch(b+3,+e.target.value);e.target.nextElementSibling.textContent=e.target.value;}} /><span style="font-size:11px;margin-left:4px">{off}</span></td>
                </tr>;
              })}</tbody>
            </table></div>
          : (PATCH_SECTIONS[S.ptab]||[]).map(sec=><div>
              <div class="sec">{sec.title}</div>
              <div class="pgrid">{sec.params.map(p=><Param p={p} />)}</div>
            </div>)
        }
      </div>

      {/* Patterns */}
      <div class={`panel${S.tab==='patterns'?' on':''}`}>
        <div class="sec">Patterns</div>
        <div class="pat-grid">{S.seq.patterns.map((p,i)=>
          <div class={`pat-card${i===S.seq.activePattern?' on':''}`} onclick={()=>{S.seq.activePattern=i;render();drawRoll();}}>
            <input value={p.name} onchange={e=>{p.name=e.target.value;render();}} onclick={e=>e.stopPropagation()} />
            <div style="font-size:11px;color:#718096;margin:2px 0">{p.length} steps</div>
            <div style="display:flex;gap:4px;margin-top:4px">
              <button class="btn" onclick={e=>{e.stopPropagation();cpClip=JSON.parse(JSON.stringify(p));}}>Copy</button>
              <button class="btn" onclick={e=>{e.stopPropagation();if(cpClip){S.seq.patterns[i]=JSON.parse(JSON.stringify(cpClip));render();}}}>Paste</button>
              <button class="btn dan" onclick={e=>{e.stopPropagation();p.steps=Array.from({length:p.length},()=>({notes:[],len:S.seq.stepLen}));render();drawRoll();}}>Clr</button>
              <button class="btn" onclick={e=>{e.stopPropagation();S.seq.chain.push(i);render();}}>+</button>
            </div>
          </div>
        )}</div>
        <div class="sec" style="margin-top:12px">Song Chain</div>
        <div class="chain">
          {S.seq.chain.length
            ? S.seq.chain.map((pi,ci)=><div class="ci" onclick={()=>{S.seq.chain.splice(ci,1);render();}}>{S.seq.patterns[pi].name}</div>)
            : <span style="color:#4a5568;font-size:12px">No patterns — click + to add</span>}
        </div>
      </div>

      {/* MIDI */}
      <div class={`panel${S.tab==='midi'?' on':''}`}>
        <div class="sec">MIDI Connection</div>
        <div style="display:flex;flex-direction:column;gap:10px;max-width:400px">
          <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:#a0aec0">Output
            <select onchange={e=>{S.midi.output=S.midi.outputs.find(o=>o.id===e.target.value)||null;render();}}>
              <option value="">— Select —</option>
              {S.midi.outputs.map(o=><option value={o.id} selected={S.midi.output?.id===o.id}>{o.name}</option>)}
            </select>
          </label>
          <label style="display:flex;flex-direction:column;gap:4px;font-size:12px;color:#a0aec0">Channel
            <select onchange={e=>S.midi.channel=+e.target.value}>
              {Array.from({length:16},(_,i)=><option value={i+1} selected={S.midi.channel===i+1}>Channel {i+1}</option>)}
            </select>
          </label>
          <div style="display:flex;align-items:center;gap:8px">
            <span class={`midi-dot${S.midi.output?' ok':''}`}></span>
            <span style="font-size:13px">{S.midi.output?`Connected: ${S.midi.output.name}`:'No device'}</span>
          </div>
          {!navigator.requestMIDIAccess&&<div style="color:#fc8181;font-size:12px">Web MIDI not supported — use Chrome/Edge</div>}
          <button class="btn" onclick={initMIDI}>Refresh</button>
          <div class="sec">NRPN Test</div>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <label style="font-size:12px">NRPN# <input id="tn" type="number" value="0" min="0" max="16383" /></label>
            <label style="font-size:12px">Val <input id="tv" type="number" value="64" min="0" max="16383" /></label>
            <button class="btn" onclick={()=>sendNRPN(+document.getElementById('tn').value,+document.getElementById('tv').value)}>Send</button>
          </div>
        </div>
      </div>
    </div>
  );
  if(S.tab==='seq') setTimeout(initCanvases,10);
}

function resizePat(len) {
  const p=S.seq.patterns[S.seq.activePattern];
  while(p.steps.length<len) p.steps.push({notes:[],len:S.seq.stepLen});
  p.steps.length=len; p.length=len; drawRoll(); render();
}
let cpClip=null;
window.resizePat=resizePat;

function render() { renderApp(); }
initMIDI(); render();
setTimeout(initCanvases,100);
</script>
</body>
</html>
